<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HSK1 - Từ vựng chiết tự | Kho chữ của NP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fef5f7;
            color: #2c2c2c;
            padding: 1.5rem;
            transition: background 0.3s, color 0.3s;
        }

        body.dark {
            background: #121212;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #c06d82;
        }

        body.dark h1 {
            color: #e0a5bb;
        }

        .theme-btn {
            background: #f0c4d0;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        body.dark .theme-btn {
            background: #3a2a38;
            color: #e0b0d5;
        }

        /* Mode tabs */
        .mode-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #f0c4d0;
            padding-bottom: 0.5rem;
        }

        body.dark .mode-tabs {
            border-bottom-color: #3a2a38;
        }

        .mode-tab {
            background: none;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.2s;
            color: #8b5a6b;
        }

        .mode-tab.active {
            background: #c06d82;
            color: white;
        }

        /* Filter */
        .filter-section {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #f0d0da;
        }

        body.dark .filter-section {
            background: #1e1e1e;
            border-color: #3a2a38;
        }

        .filter-title {
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: #c06d82;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .filter-btn {
            background: #f0d0da;
            border: none;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #c06d82;
            color: white;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #c06d82;
            color: #c06d82;
        }

        .stats {
            background: #ffe0e8;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        /* List mode */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 1.2rem;
            border: 1px solid #f0d0da;
            overflow: hidden;
        }

        body.dark .card {
            background: #1e1e1e;
            border-color: #3a2a38;
        }

        .card-inner {
            padding: 1.2rem;
        }

        .word-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .chinese-char {
            font-size: 2.5rem;
            font-weight: 700;
            color: #c06d82;
        }

        .pinyin {
            background: #f3e0e6;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .meaning-viet {
            background: #e6f3f0;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2a6b5e;
            display: inline-block;
            margin: 6px 0;
        }

        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 8px 0;
            padding: 6px 0;
            border-top: 1px solid #f0d0da;
            border-bottom: 1px solid #f0d0da;
        }

        .badge {
            background: #f0d0da;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .etymology-box {
            background: #fef0f4;
            border-radius: 0.8rem;
            padding: 0.6rem;
            margin: 8px 0;
            border-left: 3px solid #d47a9e;
        }

        .structure {
            font-size: 0.75rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .expand-section {
            margin: 8px 0;
            border-top: 1px dashed #f0d0da;
            padding-top: 6px;
        }

        .toggle-expand {
            background: none;
            border: none;
            color: #c06d82;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .compound-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 6px;
        }

        .compound-item {
            background: #f0e0e8;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.65rem;
        }

        .bishun-area {
            text-align: center;
            background: #f8e8f0;
            border-radius: 0.8rem;
            padding: 0.5rem;
            cursor: pointer;
            margin-top: 6px;
        }

        .bishun-img {
            max-width: 100%;
            max-height: 80px;
            border-radius: 10px;
            margin-top: 5px;
        }

        /* Flashcard mode */
        .flashcard-container {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }

        .flashcard {
            width: 100%;
            max-width: 550px;
            height: 420px;
            cursor: pointer;
            perspective: 1000px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            border-radius: 1.2rem;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.2rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            overflow-y: auto;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #fff0f4, #ffe2ea);
            border: 2px solid #f0c4d0;
        }

        .flashcard-back {
            background: linear-gradient(135deg, #e8eef5, #dde4ef);
            transform: rotateY(180deg);
            font-size: 1rem;
            line-height: 1.6;
            justify-content: flex-start;
            text-align: left;
            align-items: flex-start;
        }

        body.dark .flashcard-front {
            background: linear-gradient(135deg, #2a1e24, #3a2a38);
        }
        body.dark .flashcard-back {
            background: linear-gradient(135deg, #1e2a2a, #2a3a3a);
        }

        .flashcard-char {
            font-size: 4.5rem;
            font-weight: 800;
            color: #c06d82;
        }

        .flashcard-pinyin {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .flashcard-meaning {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2a6b5e;
            margin-bottom: 1rem;
        }

        .flashcard-info {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            line-height: 1.8;
        }

        .flashcard-info i {
            width: 24px;
            color: #c06d82;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .nav-btn {
            background: #c06d82;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .progress {
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        /* Quiz Modal */
        .quiz-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .quiz-modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: center;
            max-height: 80vh;
            overflow-y: auto;
        }

        body.dark .quiz-modal-content {
            background: #1e1e1e;
        }

        .quiz-question {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #c06d82;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .quiz-option {
            background: #f0d0da;
            padding: 0.8rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .quiz-option:hover {
            background: #c06d82;
            color: white;
        }

        .quiz-option.correct {
            background: #4caf50;
            color: white;
        }

        .quiz-option.wrong {
            background: #f44336;
            color: white;
        }

        .quiz-feedback {
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .quiz-next-btn {
            background: #c06d82;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            margin-top: 1rem;
            cursor: pointer;
            font-weight: 600;
        }

        .quiz-score {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #2a6b5e;
        }

        .hidden {
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #c06d82;
            font-size: 0.75rem;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .flashcard { height: 480px; }
            .flashcard-char { font-size: 3rem; }
            .flashcard-pinyin { font-size: 1.2rem; }
            .flashcard-info { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌸 HSK1 · Từ vựng chiết tự</h1>
        <button class="theme-btn" id="themeToggleBtn">
            <i class="fas fa-moon"></i> <span id="themeText">Dark mode</span>
        </button>
    </div>

    <div class="mode-tabs">
        <button class="mode-tab active" data-mode="list">📋 Danh sách</button>
        <button class="mode-tab" data-mode="flashcard">🃏 Flashcard ôn tập</button>
    </div>

    <div class="filter-section">
        <div class="filter-title"><i class="fas fa-sliders-h"></i> Lọc từ vựng</div>
        <div class="filter-group">
            <button class="filter-btn" data-filter="level" data-value="all">📚 Tất cả</button>
            <button class="filter-btn" data-filter="level" data-value="HSK1">HSK1</button>
        </div>
        <div class="filter-group">
            <button class="filter-btn" data-filter="loai" data-value="all">📖 Tất cả</button>
            <button class="filter-btn" data-filter="loai" data-value="đại từ">Đại từ</button>
            <button class="filter-btn" data-filter="loai" data-value="động từ">Động từ</button>
            <button class="filter-btn" data-filter="loai" data-value="tính từ">Tính từ</button>
            <button class="filter-btn" data-filter="loai" data-value="phó từ">Phó từ</button>
        </div>
        <div class="filter-group">
            <button class="filter-btn reset-btn" id="resetFilterBtn"><i class="fas fa-undo"></i> Đặt lại bộ lọc</button>
        </div>
    </div>

    <div class="stats" id="stats">📊 Đang tải...</div>

    <div id="listMode" class="vocab-grid"></div>

    <div id="flashcardMode" class="hidden">
        <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-inner">
                    <div class="flashcard-front">
                        <div class="flashcard-char" id="cardFrontChar">我</div>
                        <div class="flashcard-pinyin" id="cardFrontPinyin">wǒ</div>
                        <div class="flashcard-info">👆 Nhấn để lật thẻ</div>
                    </div>
                    <div class="flashcard-back">
                        <div class="flashcard-meaning" id="cardBackMeaning">tôi, ta</div>
                        <div class="flashcard-info" id="cardBackInfo"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn"><i class="fas fa-chevron-left"></i> Trước</button>
            <button class="nav-btn" id="flipBtn"><i class="fas fa-sync-alt"></i> Lật thẻ</button>
            <button class="nav-btn" id="nextBtn">Sau <i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="progress" id="progress">Thẻ 0 / 0</div>
    </div>

    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="../" class="back-link"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
    </div>
</div>

<!-- Quiz Modal -->
<div id="quizModal" class="quiz-modal">
    <div class="quiz-modal-content">
        <div class="quiz-question" id="quizQuestion">📝 Kiểm tra từ vựng!</div>
        <div class="quiz-score" id="quizScore"></div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-feedback" id="quizFeedback"></div>
        <button class="quiz-next-btn" id="quizNextBtn">Tiếp theo →</button>
    </div>
</div>

<script src="data.js"></script>
<script>
    let fullData = [];
    let filteredData = [];
    let currentMode = 'list';
    let flashcardIndex = 0;
    let isFlipped = false;
    let cardsStudied = 0;
    let quizWords = [];
    let currentQuizIndex = 0;
    let quizScore = 0;
    let quizActive = false;

    let currentFilters = { level: 'all', loai: 'all' };

    function loadData() {
        if (window.vocabData && window.vocabData.length) {
            fullData = window.vocabData;
            applyFilters();
        } else {
            document.getElementById('stats').innerHTML = '⚠️ Lỗi tải dữ liệu';
        }
    }

    function applyFilters() {
        filteredData = fullData.filter(word => {
            if (currentFilters.level !== 'all' && word.level !== currentFilters.level) return false;
            if (currentFilters.loai !== 'all' && word.loai !== currentFilters.loai) return false;
            return true;
        });
        if (filteredData.length === 0 && fullData.length > 0) {
            currentFilters = { level: 'all', loai: 'all' };
            filteredData = [...fullData];
            updateActiveButtons();
        }
        flashcardIndex = 0;
        cardsStudied = 0;
        isFlipped = false;
        document.getElementById('flashcard')?.classList.remove('flipped');
        updateStats();
        renderCurrentMode();
    }

    function updateStats() {
        document.getElementById('stats').innerHTML = `📊 Tổng: ${fullData.length} từ · Đang hiển thị: ${filteredData.length} từ`;
    }

    function updateActiveButtons() {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            const type = btn.getAttribute('data-filter');
            const val = btn.getAttribute('data-value');
            if (currentFilters[type] === val) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function renderCurrentMode() {
        if (currentMode === 'list') renderListMode();
        else renderFlashcardMode();
    }

    function renderListMode() {
        const grid = document.getElementById('listMode');
        grid.innerHTML = '';
        if (filteredData.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:2rem;">📭 Không có từ nào phù hợp</div>';
            return;
        }
        filteredData.forEach(word => {
            const vietMeaning = word.tiengViet || word.nghia || 'Đang cập nhật';
            const hasMoRong = word.moRong?.length > 0 && word.moRong[0] !== '';
            const expandHtml = hasMoRong ? `
                <div class="expand-section">
                    <button class="toggle-expand" onclick="toggleExpand(this)">
                        <i class="fas fa-plus-circle"></i> Từ mở rộng (${word.moRong.length})
                    </button>
                    <div class="compound-list hidden">
                        ${word.moRong.map(c => `<span class="compound-item">📌 ${c}</span>`).join('')}
                    </div>
                </div>
            ` : `<div class="expand-section"><span style="font-size:0.65rem;">✨ Chưa có từ mở rộng</span></div>`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="word-row">
                        <span class="chinese-char">${word.tu || '?'}</span>
                        <span class="pinyin">${word.pinyin || ''}</span>
                    </div>
                    <div class="meaning-viet"><i class="fas fa-language"></i> ${vietMeaning}</div>
                    <div class="meta-info">
                        <span class="badge">📖 ${word.loai || '?'}</span>
                        <span class="badge">🇻🇳 ${word.hanviet || '?'}</span>
                        <span class="badge">🔤 ${word.lucThu || '?'}</span>
                        <span class="badge">${word.level || 'HSK1'}</span>
                    </div>
                    <div class="etymology-box">
                        <div class="structure">🔹 ${word.chiestTu || word.chietTu || 'Đang cập nhật'}</div>
                    </div>
                    ${expandHtml}
                    <div class="bishun-area" data-url="${word.buthuan || ''}">
                        <div class="bishun-placeholder">✍️ Ấn để xem bút thuận động</div>
                        <div class="bishun-container"></div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        attachBishunEvents();
    }

    function attachBishunEvents() {
        document.querySelectorAll('.bishun-area').forEach(area => {
            const url = area.getAttribute('data-url');
            if (!url || url === '') return;
            area.addEventListener('click', () => {
                const container = area.querySelector('.bishun-container');
                if (!container || container.querySelector('img')) return;
                const placeholder = area.querySelector('.bishun-placeholder');
                if (placeholder) placeholder.remove();
                const img = document.createElement('img');
                img.src = url;
                img.className = 'bishun-img';
                container.appendChild(img);
            });
        });
    }

    function renderFlashcardMode() {
        if (filteredData.length === 0) {
            document.getElementById('progress').innerText = 'Không có từ để ôn';
            return;
        }
        const word = filteredData[flashcardIndex];
        const vietMeaning = word.tiengViet || word.nghia || 'Đang cập nhật';
        document.getElementById('cardFrontChar').innerText = word.tu || '?';
        document.getElementById('cardFrontPinyin').innerText = word.pinyin || '';
        document.getElementById('cardBackMeaning').innerHTML = `<i class="fas fa-language"></i> ${vietMeaning}`;
        
        let compoundHtml = '';
        if (word.moRong && word.moRong.length > 0 && word.moRong[0] !== '') {
            compoundHtml = `<div style="margin-top: 10px;"><strong>📖 Từ mở rộng:</strong><br>${word.moRong.map(c => `• ${c}`).join('<br>')}</div>`;
        }
        
        document.getElementById('cardBackInfo').innerHTML = `
            <div><i class="fas fa-tag"></i> <strong>Từ loại:</strong> ${word.loai || '?'}</div>
            <div><i class="fas fa-book"></i> <strong>Hán Việt:</strong> ${word.hanviet || '?'}</div>
            <div><i class="fas fa-puzzle-piece"></i> <strong>Lục thư:</strong> ${word.lucThu || '?'}</div>
            <div><i class="fas fa-cubes"></i> <strong>Chiết tự:</strong> ${word.chiestTu || word.chietTu || 'Đang cập nhật'}</div>
            ${compoundHtml}
        `;
        document.getElementById('progress').innerHTML = `Thẻ ${flashcardIndex + 1} / ${filteredData.length} | 📚 Đã học: ${cardsStudied} từ`;
    }

    function nextCard() {
        if (filteredData.length === 0) return;
        
        // Đánh dấu đã học từ hiện tại
        cardsStudied++;
        
        // Kiểm tra nếu đã học đủ 7 từ và chưa có quiz đang mở
        if (!quizActive && cardsStudied >= 7 && currentMode === 'flashcard') {
            showQuiz();
        }
        
        flashcardIndex = (flashcardIndex + 1) % filteredData.length;
        if (flashcardIndex === 0 && cardsStudied >= filteredData.length) {
            // Hết bộ, reset
            cardsStudied = 0;
        }
        isFlipped = false;
        document.getElementById('flashcard')?.classList.remove('flipped');
        renderFlashcardMode();
    }

    function prevCard() {
        if (filteredData.length === 0) return;
        if (flashcardIndex > 0) {
            flashcardIndex--;
            isFlipped = false;
            document.getElementById('flashcard')?.classList.remove('flipped');
            renderFlashcardMode();
        }
    }

    function flipCard() {
        if (filteredData.length === 0) return;
        const fc = document.getElementById('flashcard');
        if (isFlipped) fc.classList.remove('flipped');
        else fc.classList.add('flipped');
        isFlipped = !isFlipped;
    }

    function showQuiz() {
        // Lấy các từ đã học gần nhất (từ đầu đến cardsStudied)
        const studiedWords = filteredData.slice(0, Math.min(cardsStudied, filteredData.length));
        // Lọc ra từ có từ mở rộng
        quizWords = studiedWords.filter(w => w.moRong && w.moRong.length > 0 && w.moRong[0] !== '');
        
        if (quizWords.length === 0) {
            cardsStudied = 0;
            return;
        }
        
        quizActive = true;
        currentQuizIndex = 0;
        quizScore = 0;
        startQuiz();
    }

    function startQuiz() {
        if (currentQuizIndex >= quizWords.length) {
            endQuiz();
            return;
        }
        
        const word = quizWords[currentQuizIndex];
        // Lấy danh sách từ mở rộng
        const compounds = word.moRong.filter(c => c && c.trim() !== '');
        if (compounds.length === 0) {
            currentQuizIndex++;
            startQuiz();
            return;
        }
        
        // Chọn ngẫu nhiên 1 compound để hỏi
        const correctCompound = compounds[Math.floor(Math.random() * compounds.length)];
        const correctAnswer = correctCompound.split(':')[0];
        
        // Tạo đáp án nhiễu từ các từ khác
        let allCompounds = [];
        quizWords.forEach(w => {
            if (w.moRong) allCompounds.push(...w.moRong.filter(c => c && c.trim() !== ''));
        });
        let options = [correctAnswer];
        while (options.length < 4 && allCompounds.length > 0) {
            const randomCompound = allCompounds[Math.floor(Math.random() * allCompounds.length)];
            const randomWord = randomCompound.split(':')[0];
            if (!options.includes(randomWord) && randomWord !== correctAnswer) {
                options.push(randomWord);
            }
        }
        // Trộn đáp án
        options = options.sort(() => Math.random() - 0.5);
        
        document.getElementById('quizQuestion').innerHTML = `📝 "${word.tu}" (${word.pinyin}) có nghĩa mở rộng nào?`;
        document.getElementById('quizScore').innerHTML = `Điểm: ${quizScore}/${quizWords.length}`;
        
        const optionsDiv = document.getElementById('quizOptions');
        optionsDiv.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'quiz-option';
            btn.innerHTML = opt;
            btn.onclick = () => checkAnswer(opt, correctAnswer, btn);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById('quizFeedback').innerHTML = '';
        document.getElementById('quizNextBtn').style.display = 'none';
        document.getElementById('quizModal').style.display = 'flex';
    }
    
    function checkAnswer(selected, correct, element) {
        const feedback = document.getElementById('quizFeedback');
        if (selected === correct) {
            element.classList.add('correct');
            feedback.innerHTML = '✅ Chính xác! +1 điểm';
            quizScore++;
            document.getElementById('quizScore').innerHTML = `Điểm: ${quizScore}/${quizWords.length}`;
            setTimeout(() => {
                currentQuizIndex++;
                startQuiz();
            }, 1000);
        } else {
            element.classList.add('wrong');
            feedback.innerHTML = `❌ Sai! Đáp án đúng là: ${correct}`;
            setTimeout(() => {
                currentQuizIndex++;
                startQuiz();
            }, 1500);
        }
        
        // Disable all options
        document.querySelectorAll('.quiz-option').forEach(opt => {
            opt.style.pointerEvents = 'none';
        });
    }
    
    function endQuiz() {
        document.getElementById('quizModal').style.display = 'none';
        quizActive = false;
        cardsStudied = 0;
        alert(`🎉 Kết thúc quiz! Bạn đúng ${quizScore}/${quizWords.length} câu.`);
    }

    function initFilters() {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.getAttribute('data-filter');
                const val = btn.getAttribute('data-value');
                currentFilters[type] = val;
                applyFilters();
                updateActiveButtons();
                if (currentMode === 'flashcard') {
                    isFlipped = false;
                    document.getElementById('flashcard')?.classList.remove('flipped');
                }
            });
        });
        document.getElementById('resetFilterBtn').addEventListener('click', () => {
            currentFilters = { level: 'all', loai: 'all' };
            applyFilters();
            updateActiveButtons();
        });
    }

    function initModeTabs() {
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMode = tab.getAttribute('data-mode');
                if (currentMode === 'list') {
                    document.getElementById('listMode').classList.remove('hidden');
                    document.getElementById('flashcardMode').classList.add('hidden');
                    renderListMode();
                } else {
                    document.getElementById('listMode').classList.add('hidden');
                    document.getElementById('flashcardMode').classList.remove('hidden');
                    cardsStudied = 0;
                    flashcardIndex = 0;
                    isFlipped = false;
                    renderFlashcardMode();
                }
            });
        });
    }

    function initTheme() {
        const stored = localStorage.getItem('theme_hsk');
        const body = document.body;
        const btn = document.getElementById('themeToggleBtn');
        const span = document.getElementById('themeText');
        if (stored === 'dark') {
            body.classList.add('dark');
            span.innerText = 'Light mode';
        } else {
            span.innerText = 'Dark mode';
        }
        btn.addEventListener('click', () => {
            body.classList.toggle('dark');
            localStorage.setItem('theme_hsk', body.classList.contains('dark') ? 'dark' : 'light');
            span.innerText = body.classList.contains('dark') ? 'Light mode' : 'Dark mode';
        });
    }

    window.toggleExpand = function(btn) {
        const list = btn.parentElement.querySelector('.compound-list');
        if (list.classList.contains('hidden')) {
            list.classList.remove('hidden');
            btn.innerHTML = '<i class="fas fa-minus-circle"></i> Thu gọn';
        } else {
            list.classList.add('hidden');
            const count = list.children.length;
            btn.innerHTML = `<i class="fas fa-plus-circle"></i> Từ mở rộng (${count})`;
        }
    };

    document.getElementById('quizNextBtn').addEventListener('click', () => {
        currentQuizIndex++;
        startQuiz();
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        initFilters();
        initModeTabs();
        initTheme();
        document.getElementById('prevBtn')?.addEventListener('click', prevCard);
        document.getElementById('nextBtn')?.addEventListener('click', nextCard);
        document.getElementById('flipBtn')?.addEventListener('click', flipCard);
        document.getElementById('flashcard')?.addEventListener('click', flipCard);
    });
</script>
</body>
</html>
