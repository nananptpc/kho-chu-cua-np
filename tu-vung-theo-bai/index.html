<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK1 Vocabulary | Chiết tự + Từ mở rộng</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #fff5f7;
            color: #4a3b3f;
            padding: 2rem;
        }
        body.dark { background: #1e1a1c; color: #f0e6ea; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            border-bottom: 3px solid #fbc4d0;
            padding-bottom: 1rem;
        }
        body.dark .header { border-bottom-color: #ae7d8a; }
        h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #e38b9e, #c06d82); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .sub { background: #ffe2e8; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; font-weight: 600; }
        body.dark .sub { background: #382e32; color: #f2c2cf; }
        .theme-btn { background: #f9cfda; border: none; padding: 0.6rem 1.2rem; border-radius: 60px; font-weight: 600; cursor: pointer; display: flex; gap: 10px; align-items: center; }
        body.dark .theme-btn { background: #563f46; color: #ffdfe7; }
        .stats { background: #ffeef2; padding: 0.5rem 1rem; border-radius: 40px; font-size: 0.85rem; margin-bottom: 1.5rem; display: inline-block; }
        body.dark .stats { background: #2f2429; }
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.8rem; margin-top: 1.5rem; }
        .card { background: #fffbfc; border-radius: 2rem; box-shadow: 0 10px 25px rgba(190, 90, 110, 0.1); border: 1px solid #ffe2ea; overflow: hidden; }
        body.dark .card { background: #2c2428; border-color: #56424a; }
        .card-inner { padding: 1.6rem; }
        .word-row { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 10px; margin-bottom: 0.5rem; }
        .chinese-char { font-size: 3rem; font-weight: 800; color: #bc6f85; }
        body.dark .chinese-char { color: #f3bfce; }
        .pinyin { background: #ffeef2; padding: 0.3rem 1rem; border-radius: 40px; font-weight: 600; color: #c27086; }
        body.dark .pinyin { background: #3f2f35; color: #f5cdda; }
        .meaning-viet { background: #e8f0fe; padding: 0.3rem 0.8rem; border-radius: 30px; font-size: 0.85rem; font-weight: 600; color: #2e7d64; display: inline-block; margin: 5px 0; }
        body.dark .meaning-viet { background: #2a4a4a; color: #9fd3c7; }
        .meta-info { display: flex; flex-wrap: wrap; gap: 0.6rem; margin: 0.8rem 0 1rem; padding: 0.6rem 0; border-top: 1px dashed #f7ced9; border-bottom: 1px dashed #f7ced9; }
        .badge { background: #fadce3; padding: 0.25rem 0.8rem; border-radius: 30px; font-size: 0.75rem; font-weight: 600; }
        body.dark .badge { background: #4f3941; color: #f3c4d2; }
        .luc-thu { background: #e8d3da; color: #8b5a6b; }
        .etymology-box { background: #fff3f6; border-radius: 1.2rem; padding: 1rem; margin: 1rem 0; border-left: 5px solid #e38b9e; }
        body.dark .etymology-box { background: #352c30; border-left-color: #e6a7bb; }
        .etym-title { font-weight: 800; font-size: 0.8rem; text-transform: uppercase; color: #d4819a; margin-bottom: 0.6rem; }
        .structure { font-size: 0.85rem; font-weight: 600; background: #ffe7ed; padding: 0.5rem; border-radius: 1rem; line-height: 1.5; }
        .expand-section { margin: 1rem 0 0.8rem; border-top: 2px dotted #f7ced9; padding-top: 0.8rem; }
        .toggle-expand { background: none; border: none; color: #c27086; font-weight: 700; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0.3rem 0; }
        .compound-list { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 0.8rem; }
        .compound-item { background: #ffe2e8; padding: 0.3rem 0.8rem; border-radius: 30px; font-size: 0.75rem; font-weight: 500; }
        body.dark .compound-item { background: #4f3941; }
        .bishun-area { text-align: center; background: #fdeef2; border-radius: 1.2rem; padding: 0.8rem; cursor: pointer; margin-top: 0.8rem; }
        .bishun-placeholder { background: #ffecf0; padding: 0.5rem; border-radius: 1rem; font-size: 0.75rem; }
        .bishun-img { max-width: 100%; max-height: 100px; border-radius: 12px; margin-top: 8px; }
        .hidden { display: none; }
        @media (max-width: 700px) { body { padding: 1rem; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h1>🌸 HSK1 · Từ vựng chiết tự</h1><div class="sub">🔍 Chiết tự + Nghĩa Việt + Từ mở rộng</div></div>
        <button class="theme-btn" id="themeToggleBtn"><i class="fas fa-moon"></i> <span id="themeText">Dark mode</span></button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="vocab-grid" id="vocabGrid"></div>
</div>

<script src="data.js"></script>
<script>
    function renderCards() {
        const grid = document.getElementById('vocabGrid');
        const statsDiv = document.getElementById('stats');
        if (!grid || !window.vocabData || window.vocabData.length === 0) {
            if(statsDiv) statsDiv.innerHTML = '⚠️ Đang tải dữ liệu hoặc data.js bị lỗi...';
            return;
        }
        
        const data = window.vocabData;
        statsDiv.innerHTML = `📚 Tổng số từ: ${data.length} | 🌟 HSK1 · Chiết tự + Từ mở rộng`;
        
        grid.innerHTML = '';
        data.forEach(word => {
            const vietMeaning = word.tiengViet || word.nghia || word.meaning || 'Đang cập nhật';
            
            // Xử lý từ mở rộng
            let expandHtml = '';
            if (word.moRong && Array.isArray(word.moRong) && word.moRong.length > 0 && word.moRong[0] !== '') {
                expandHtml = `
                    <div class="expand-section">
                        <button class="toggle-expand" onclick="toggleExpand(this)">
                            <i class="fas fa-plus-circle"></i> 📖 Từ mở rộng (${word.moRong.length})
                        </button>
                        <div class="compound-list hidden">
                            ${word.moRong.map(c => `<span class="compound-item">${c}</span>`).join('')}
                        </div>
                    </div>
                `;
            } else {
                expandHtml = `<div class="expand-section"><i class="fas fa-info-circle" style="font-size:0.7rem; color:#c2798f;"></i> <span style="font-size:0.7rem;">✨ Chưa có từ mở rộng</span></div>`;
            }
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="word-row">
                        <span class="chinese-char">${word.tu || '?'}</span>
                        <span class="pinyin">${word.pinyin || ''}</span>
                    </div>
                    <div class="meaning-viet">
                        <i class="fas fa-language"></i> ${vietMeaning}
                    </div>
                    <div class="meta-info">
                        <span class="badge">📖 ${word.loai || '?'}</span>
                        <span class="badge">🇻🇳 ${word.hanviet || '?'}</span>
                        <span class="badge luc-thu">🔤 ${word.lucThu || '?'}</span>
                        <span class="badge">${word.level || 'HSK1'}</span>
                        ${word.bai ? `<span class="badge">📘 ${word.bai}</span>` : ''}
                    </div>
                    <div class="etymology-box">
                        <div class="etym-title"><i class="fas fa-cubes"></i> ✦ CHIẾT TỰ | 析字 ✦</div>
                        <div class="structure">🔹 ${word.chiestTu || word.chietTu || 'Đang cập nhật'}</div>
                    </div>
                    ${expandHtml}
                    <div class="bishun-area" data-url="${word.buthuan || ''}">
                        <div class="bishun-placeholder">✍️ Ấn để xem bút thuận động</div>
                        <div class="bishun-container"></div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        
        // Gắn sự kiện bút thuận
        document.querySelectorAll('.bishun-area').forEach(area => {
            const url = area.getAttribute('data-url');
            if (!url || url === '') {
                area.innerHTML = '<div style="padding:0.5rem; color:#999;">⚠️ Chưa có link bút thuận</div>';
                return;
            }
            area.addEventListener('click', () => {
                const container = area.querySelector('.bishun-container');
                if (!container) return;
                if (container.querySelector('img')) return;
                const placeholder = area.querySelector('.bishun-placeholder');
                if (placeholder) placeholder.remove();
                const img = document.createElement('img');
                img.src = url;
                img.className = 'bishun-img';
                img.onerror = () => { img.alt = 'Không tải được ảnh'; };
                container.appendChild(img);
            });
        });
    }
    
    window.toggleExpand = function(btn) {
        const list = btn.parentElement.querySelector('.compound-list');
        if (list.classList.contains('hidden')) {
            list.classList.remove('hidden');
            btn.innerHTML = '<i class="fas fa-minus-circle"></i> 📖 Thu gọn';
        } else {
            list.classList.add('hidden');
            const count = list.children.length;
            btn.innerHTML = `<i class="fas fa-plus-circle"></i> 📖 Từ mở rộng (${count})`;
        }
    };
    
    function initTheme() {
        const stored = localStorage.getItem('theme_hsk');
        const body = document.body;
        const btn = document.getElementById('themeToggleBtn');
        const span = document.getElementById('themeText');
        if (stored === 'dark') {
            body.classList.add('dark');
            if(span) span.innerText = 'Light mode';
        } else {
            if(span) span.innerText = 'Dark mode';
        }
        if(btn) {
            btn.addEventListener('click', () => {
                body.classList.toggle('dark');
                const isDark = body.classList.contains('dark');
                localStorage.setItem('theme_hsk', isDark ? 'dark' : 'light');
                if(span) span.innerText = isDark ? 'Light mode' : 'Dark mode';
            });
        }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            if (window.vocabData) renderCards();
            else console.error('Không tìm thấy data.js');
        }, 100);
        initTheme();
    });
</script>
</body>
</html>
