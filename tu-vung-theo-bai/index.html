<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HSK1 - Từ vựng chiết tự | Kho chữ của NP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fef5f7;
            color: #1a1a1a;
            padding: 1.5rem;
            transition: background 0.3s, color 0.3s;
        }

        body.dark {
            background: #0a0a0a;
            color: #f0f0f0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #b84c6c;
        }

        body.dark h1 {
            color: #e8a5bb;
        }

        .theme-btn {
            background: #e8c4d0;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            gap: 8px;
            align-items: center;
            color: #4a2a38;
        }

        body.dark .theme-btn {
            background: #3a2a38;
            color: #e0b0d5;
        }

        /* Mode tabs */
        .mode-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e8c4d0;
            padding-bottom: 0.5rem;
        }

        body.dark .mode-tabs {
            border-bottom-color: #4a3a48;
        }

        .mode-tab {
            background: none;
            border: none;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.2s;
            color: #6a4a58;
        }

        body.dark .mode-tab {
            color: #aaa;
        }

        .mode-tab.active {
            background: #b84c6c;
            color: white;
        }

        /* Filter */
        .filter-section {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e8c4d0;
        }

        body.dark .filter-section {
            background: #1a1a1a;
            border-color: #4a3a48;
        }

        .filter-title {
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: #b84c6c;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .filter-btn {
            background: #e8c4d0;
            border: none;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            color: #2a1a22;
        }

        body.dark .filter-btn {
            background: #3a2a38;
            color: #ddd;
        }

        .filter-btn.active {
            background: #b84c6c;
            color: white;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #b84c6c;
            color: #b84c6c;
        }

        .stats {
            background: #e8c4d0;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1rem;
            color: #2a1a22;
        }

        body.dark .stats {
            background: #2a2a2a;
            color: #e0a5bb;
        }

        /* List mode */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 1.2rem;
            border: 1px solid #e8c4d0;
            overflow: hidden;
        }

        body.dark .card {
            background: #1a1a1a;
            border-color: #4a3a48;
        }

        .card-inner {
            padding: 1.2rem;
        }

        .word-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .chinese-char {
            font-size: 2.5rem;
            font-weight: 700;
            color: #b84c6c;
        }

        .pinyin {
            background: #e8c4d0;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2a1a22;
        }

        .meaning-viet {
            background: #c8e0dc;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1a4a3e;
            display: inline-block;
            margin: 6px 0;
        }

        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 8px 0;
            padding: 6px 0;
            border-top: 1px solid #e8c4d0;
            border-bottom: 1px solid #e8c4d0;
        }

        .badge {
            background: #e8c4d0;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            color: #2a1a22;
        }

        .etymology-box {
            background: #fce8f0;
            border-radius: 0.8rem;
            padding: 0.6rem;
            margin: 8px 0;
            border-left: 3px solid #b84c6c;
        }

        body.dark .etymology-box {
            background: #2a1a24;
        }

        .structure {
            font-size: 0.75rem;
            font-weight: 500;
            line-height: 1.4;
            color: #1a1a1a;
        }

        body.dark .structure {
            color: #ddd;
        }

        .bishun-area {
            text-align: center;
            background: #e8c4d0;
            border-radius: 0.8rem;
            padding: 0.5rem;
            cursor: pointer;
            margin-top: 6px;
            color: #2a1a22;
            font-weight: 500;
        }

        .bishun-img {
            max-width: 100%;
            max-height: 80px;
            border-radius: 10px;
            margin-top: 5px;
        }

        /* Flashcard mode */
        .flashcard-container {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }

        .flashcard {
            width: 100%;
            max-width: 550px;
            height: 460px;
            cursor: pointer;
            perspective: 1000px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            border-radius: 1.2rem;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.2rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            overflow-y: auto;
        }

        .flashcard-front {
            background: linear-gradient(135deg, #fff0f4, #fce0e8);
            border: 2px solid #e8c4d0;
        }

        .flashcard-back {
            background: linear-gradient(135deg, #e0e8f0, #d0dce8);
            transform: rotateY(180deg);
            font-size: 0.95rem;
            line-height: 1.6;
            justify-content: flex-start;
            text-align: left;
            align-items: flex-start;
        }

        body.dark .flashcard-front {
            background: linear-gradient(135deg, #2a1e24, #3a2a38);
        }
        body.dark .flashcard-back {
            background: linear-gradient(135deg, #1a2a2a, #2a3a3a);
        }

        .flashcard-char {
            font-size: 4.5rem;
            font-weight: 800;
            color: #b84c6c;
        }

        .flashcard-pinyin {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 0.5rem;
            color: #2a1a22;
        }

        .flashcard-meaning {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a6b5e;
            margin-bottom: 1rem;
        }

        .flashcard-info {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            line-height: 1.8;
            color: #2a2a2a;
        }

        body.dark .flashcard-info {
            color: #ccc;
        }

        .flashcard-info i {
            width: 24px;
            color: #b84c6c;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin: 1rem 0;
        }

        .nav-btn {
            background: #b84c6c;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .progress {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #b84c6c;
        }

        /* Quiz Modal */
        .quiz-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .quiz-modal-content {
            background: white;
            max-width: 1000px;
            width: 95%;
            border-radius: 1.5rem;
            padding: 1.5rem;
            max-height: 85vh;
            overflow-y: auto;
        }

        body.dark .quiz-modal-content {
            background: #1a1a1a;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .quiz-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #b84c6c;
        }

        .quiz-score-board {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 0.5rem;
            color: #2a1a22;
        }

        .drag-game-area {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .words-container {
            flex: 1;
            min-width: 280px;
        }

        .drop-zone {
            background: #fce8f0;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #b84c6c;
            transition: all 0.2s;
        }

        body.dark .drop-zone {
            background: #2a1a24;
        }

        .drop-zone.drag-over {
            background: #d4a0b8;
            border-color: #ff8cae;
        }

        .drop-zone.completed {
            background: #c8e0dc;
            border-color: #28a745;
            opacity: 0.8;
        }

        .drop-zone-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .drop-zone-char {
            font-size: 2rem;
            font-weight: 700;
            color: #b84c6c;
        }

        .drop-zone-pinyin {
            font-size: 0.8rem;
            color: #6a4a58;
        }

        .drop-zone-matched {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
            min-height: 50px;
        }

        .matched-card {
            background: #28a745;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .drag-items-container {
            flex: 1;
            min-width: 280px;
            background: #e8c4d0;
            border-radius: 1rem;
            padding: 1rem;
        }

        body.dark .drag-items-container {
            background: #2a2a2a;
        }

        .drag-title {
            font-weight: 600;
            margin-bottom: 1rem;
            text-align: center;
            color: #2a1a22;
        }

        .drag-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            min-height: 200px;
        }

        .drag-card {
            background: #b84c6c;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: grab;
            user-select: none;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .drag-card:active {
            cursor: grabbing;
        }

        .drag-card.dragging {
            opacity: 0.4;
        }

        .quiz-result {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e8c4d0;
        }

        .quiz-next-btn {
            background: #b84c6c;
            color: white;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .quiz-feedback {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #b84c6c;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .drag-game-area { flex-direction: column; }
            .flashcard { height: 480px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌸 HSK1 · Từ vựng chiết tự</h1>
        <button class="theme-btn" id="themeToggleBtn">
            <i class="fas fa-moon"></i> <span id="themeText">Dark mode</span>
        </button>
    </div>

    <div class="mode-tabs">
        <button class="mode-tab active" data-mode="list">📋 Danh sách</button>
        <button class="mode-tab" data-mode="flashcard">🃏 Flashcard ôn tập</button>
    </div>

    <div class="filter-section">
        <div class="filter-title"><i class="fas fa-sliders-h"></i> Lọc từ vựng</div>
        <div class="filter-group">
            <button class="filter-btn" data-filter="level" data-value="all">📚 Tất cả</button>
            <button class="filter-btn" data-filter="level" data-value="HSK1">HSK1</button>
        </div>
        <div class="filter-group">
            <button class="filter-btn" data-filter="loai" data-value="all">📖 Tất cả</button>
            <button class="filter-btn" data-filter="loai" data-value="đại từ">Đại từ</button>
            <button class="filter-btn" data-filter="loai" data-value="động từ">Động từ</button>
            <button class="filter-btn" data-filter="loai" data-value="tính từ">Tính từ</button>
            <button class="filter-btn" data-filter="loai" data-value="phó từ">Phó từ</button>
        </div>
        <div class="filter-group">
            <button class="filter-btn reset-btn" id="resetFilterBtn"><i class="fas fa-undo"></i> Đặt lại bộ lọc</button>
        </div>
    </div>

    <div class="stats" id="stats">📊 Đang tải...</div>

    <div id="listMode" class="vocab-grid"></div>

    <div id="flashcardMode" class="hidden">
        <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-inner">
                    <div class="flashcard-front">
                        <div class="flashcard-char" id="cardFrontChar">我</div>
                        <div class="flashcard-pinyin" id="cardFrontPinyin">wǒ</div>
                        <div class="flashcard-info">👆 Nhấn để lật thẻ</div>
                    </div>
                    <div class="flashcard-back">
                        <div class="flashcard-meaning" id="cardBackMeaning">tôi, ta</div>
                        <div class="flashcard-info" id="cardBackInfo"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn"><i class="fas fa-chevron-left"></i> Trước</button>
            <button class="nav-btn" id="flipBtn"><i class="fas fa-sync-alt"></i> Lật thẻ</button>
            <button class="nav-btn" id="nextBtn">Sau <i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="progress" id="progress">Thẻ 0 / 0 | 📚 Đã học: 0 từ</div>
    </div>

    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="../" class="back-link"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
    </div>
</div>

<!-- Quiz Modal -->
<div id="quizModal" class="quiz-modal">
    <div class="quiz-modal-content">
        <div class="quiz-header">
            <div class="quiz-title">🎯 KÉO THẢ TỪ MỞ RỘNG</div>
            <div class="quiz-score-board" id="quizScoreBoard">Điểm: 0 / 0</div>
            <div class="quiz-feedback" id="quizFeedback" style="color: #b84c6c;"></div>
        </div>
        <div class="drag-game-area" id="dragGameArea"></div>
        <div class="quiz-result">
            <button class="quiz-next-btn" id="quizNextBtn">Tiếp tục →</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script>
    let fullData = [];
    let filteredData = [];
    let currentMode = 'list';
    let flashcardIndex = 0;
    let isFlipped = false;
    let cardsStudied = 0;
    
    let quizWords = [];
    let currentQuizQuestion = 0;
    let quizScore = 0;
    let quizMatched = {};
    let quizActive = false;

    let currentFilters = { level: 'all', loai: 'all' };

    function loadData() {
        if (window.vocabData && window.vocabData.length) {
            fullData = window.vocabData;
            applyFilters();
            console.log('✅ Dữ liệu loaded:', fullData.length, 'từ');
        } else {
            document.getElementById('stats').innerHTML = '⚠️ Lỗi tải dữ liệu. Đảm bảo file data.js tồn tại.';
            console.error('Không tìm thấy window.vocabData');
        }
    }

    function applyFilters() {
        filteredData = fullData.filter(word => {
            if (currentFilters.level !== 'all' && word.level !== currentFilters.level) return false;
            if (currentFilters.loai !== 'all' && word.loai !== currentFilters.loai) return false;
            return true;
        });
        if (filteredData.length === 0 && fullData.length > 0) {
            currentFilters = { level: 'all', loai: 'all' };
            filteredData = [...fullData];
            updateActiveButtons();
        }
        flashcardIndex = 0;
        cardsStudied = 0;
        isFlipped = false;
        document.getElementById('flashcard')?.classList.remove('flipped');
        updateStats();
        renderCurrentMode();
    }

    function updateStats() {
        document.getElementById('stats').innerHTML = `📊 Tổng: ${fullData.length} từ · Đang hiển thị: ${filteredData.length} từ`;
    }

    function updateActiveButtons() {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            const type = btn.getAttribute('data-filter');
            const val = btn.getAttribute('data-value');
            if (currentFilters[type] === val) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function renderCurrentMode() {
        if (currentMode === 'list') renderListMode();
        else renderFlashcardMode();
    }

    function renderListMode() {
        const grid = document.getElementById('listMode');
        grid.innerHTML = '';
        if (filteredData.length === 0) {
            grid.innerHTML = '<div style="text-align:center; padding:2rem;">📭 Không có từ nào phù hợp</div>';
            return;
        }
        filteredData.forEach(word => {
            const vietMeaning = word.tiengViet || word.nghia || 'Đang cập nhật';
            const hasMoRong = word.moRong?.length > 0 && word.moRong[0] !== '';
            const expandHtml = hasMoRong ? `
                <div class="expand-section">
                    <button class="toggle-expand" onclick="toggleExpand(this)">
                        <i class="fas fa-plus-circle"></i> Từ mở rộng (${word.moRong.length})
                    </button>
                    <div class="compound-list hidden">
                        ${word.moRong.map(c => `<span class="compound-item">📌 ${c}</span>`).join('')}
                    </div>
                </div>
            ` : `<div class="expand-section"><span style="font-size:0.65rem;">✨ Chưa có từ mở rộng</span></div>`;

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="word-row">
                        <span class="chinese-char">${word.tu || '?'}</span>
                        <span class="pinyin">${word.pinyin || ''}</span>
                    </div>
                    <div class="meaning-viet"><i class="fas fa-language"></i> ${vietMeaning}</div>
                    <div class="meta-info">
                        <span class="badge">📖 ${word.loai || '?'}</span>
                        <span class="badge">🇻🇳 ${word.hanviet || '?'}</span>
                        <span class="badge">🔤 ${word.lucThu || '?'}</span>
                        <span class="badge">${word.level || 'HSK1'}</span>
                    </div>
                    <div class="etymology-box">
                        <div class="structure">🔹 ${word.chiestTu || word.chietTu || 'Đang cập nhật'}</div>
                    </div>
                    ${expandHtml}
                    <div class="bishun-area" data-url="${word.buthuan || ''}">
                        <div class="bishun-placeholder">✍️ Ấn để xem bút thuận động</div>
                        <div class="bishun-container"></div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        attachBishunEvents();
    }

    function attachBishunEvents() {
        document.querySelectorAll('.bishun-area').forEach(area => {
            const url = area.getAttribute('data-url');
            if (!url || url === '') return;
            area.addEventListener('click', () => {
                const container = area.querySelector('.bishun-container');
                if (!container || container.querySelector('img')) return;
                const placeholder = area.querySelector('.bishun-placeholder');
                if (placeholder) placeholder.remove();
                const img = document.createElement('img');
                img.src = url;
                img.className = 'bishun-img';
                container.appendChild(img);
            });
        });
    }

    function renderFlashcardMode() {
        if (filteredData.length === 0) {
            document.getElementById('progress').innerHTML = 'Không có từ để ôn';
            return;
        }
        const word = filteredData[flashcardIndex];
        const vietMeaning = word.tiengViet || word.nghia || 'Đang cập nhật';
        document.getElementById('cardFrontChar').innerText = word.tu || '?';
        document.getElementById('cardFrontPinyin').innerText = word.pinyin || '';
        document.getElementById('cardBackMeaning').innerHTML = `<i class="fas fa-language"></i> ${vietMeaning}`;
        
        let compoundHtml = '';
        if (word.moRong && word.moRong.length > 0 && word.moRong[0] !== '') {
            compoundHtml = `<div style="margin-top: 10px;"><strong>📖 Từ mở rộng:</strong><br>${word.moRong.map(c => `• ${c}`).join('<br>')}</div>`;
        }
        
        document.getElementById('cardBackInfo').innerHTML = `
            <div><i class="fas fa-tag"></i> <strong>Từ loại:</strong> ${word.loai || '?'}</div>
            <div><i class="fas fa-book"></i> <strong>Hán Việt:</strong> ${word.hanviet || '?'}</div>
            <div><i class="fas fa-puzzle-piece"></i> <strong>Lục thư:</strong> ${word.lucThu || '?'}</div>
            <div><i class="fas fa-cubes"></i> <strong>Chiết tự:</strong> ${word.chiestTu || word.chietTu || 'Đang cập nhật'}</div>
            ${compoundHtml}
        `;
        document.getElementById('progress').innerHTML = `Thẻ ${flashcardIndex + 1} / ${filteredData.length} | 📚 Đã học: ${cardsStudied} từ`;
    }

    function nextCard() {
        if (filteredData.length === 0) return;
        
        // Tăng số từ đã học
        cardsStudied++;
        console.log(`📖 Đã học: ${cardsStudied} từ`);
        
        // KIỂM TRA QUIZ: sau mỗi 3 từ (dễ test hơn), hoặc 5 từ
        if (!quizActive && cardsStudied % 3 === 0 && cardsStudied > 0 && currentMode === 'flashcard') {
            console.log('🎯 Trigger quiz!');
            showQuiz();
        }
        
        flashcardIndex = (flashcardIndex + 1) % filteredData.length;
        if (flashcardIndex === 0 && cardsStudied >= filteredData.length) {
            // Đã học hết bộ, giữ nguyên số đã học
        }
        isFlipped = false;
        document.getElementById('flashcard')?.classList.remove('flipped');
        renderFlashcardMode();
    }

    function prevCard() {
        if (filteredData.length === 0) return;
        if (flashcardIndex > 0) {
            flashcardIndex--;
            isFlipped = false;
            document.getElementById('flashcard')?.classList.remove('flipped');
            renderFlashcardMode();
        }
    }

    function flipCard() {
        if (filteredData.length === 0) return;
        const fc = document.getElementById('flashcard');
        if (isFlipped) fc.classList.remove('flipped');
        else fc.classList.add('flipped');
        isFlipped = !isFlipped;
    }

    // ============ QUIZ ============
    function showQuiz() {
        const studiedCount = cardsStudied;
        const studiedWords = filteredData.slice(0, Math.min(studiedCount, filteredData.length));
        quizWords = studiedWords.filter(w => w.moRong && w.moRong.length > 0 && w.moRong[0] !== '');
        
        console.log('Quiz Words:', quizWords.length);
        
        if (quizWords.length < 2) {
            console.log('Không đủ từ có từ mở rộng để làm quiz');
            return;
        }
        
        quizActive = true;
        currentQuizQuestion = 0;
        quizScore = 0;
        startQuizQuestion();
        document.getElementById('quizModal').style.display = 'flex';
    }

    function startQuizQuestion() {
        if (currentQuizQuestion >= quizWords.length) {
            endQuiz();
            return;
        }
        
        // Lấy 2-3 từ cho mỗi câu quiz
        const wordsForQuiz = [];
        for (let i = currentQuizQuestion; i < Math.min(quizWords.length, currentQuizQuestion + 2); i++) {
            wordsForQuiz.push(quizWords[i]);
        }
        
        if (wordsForQuiz.length === 0) {
            currentQuizQuestion++;
            startQuizQuestion();
            return;
        }
        
        const allDrags = [];
        const correctMap = {};
        
        wordsForQuiz.forEach(word => {
            if (word.moRong && word.moRong.length > 0) {
                word.moRong.forEach(compound => {
                    const compoundWord = compound.split(':')[0];
                    allDrags.push({ compound: compoundWord, full: compound, parentTu: word.tu });
                    correctMap[compoundWord] = word.tu;
                });
            }
        });
        
        const shuffledDrags = [...allDrags].sort(() => Math.random() - 0.5);
        
        quizMatched = {};
        wordsForQuiz.forEach(word => {
            quizMatched[word.tu] = [];
        });
        
        renderQuizUI(wordsForQuiz, shuffledDrags, correctMap);
    }
    
    function renderQuizUI(questions, dragItems, correctMap) {
        const container = document.getElementById('dragGameArea');
        if (!container) return;
        
        document.getElementById('quizScoreBoard').innerHTML = `🎯 Câu ${currentQuizQuestion + 1}/${quizWords.length} | Điểm: ${quizScore}`;
        
        const dropZonesHtml = questions.map(q => `
            <div class="drop-zone" data-parent="${q.tu}" data-pinyin="${q.pinyin || ''}" data-char="${q.tu}">
                <div class="drop-zone-header">
                    <span class="drop-zone-char">${q.tu}</span>
                    <span class="drop-zone-pinyin">${q.pinyin || ''}</span>
                </div>
                <div class="drop-zone-matched" id="matched-${q.tu}">
                    ${quizMatched[q.tu].map(m => `<span class="matched-card"><i class="fas fa-check-circle"></i> ${m}</span>`).join('')}
                </div>
            </div>
        `).join('');
        
        const dragItemsHtml = dragItems.map(item => `
            <div class="drag-card" draggable="true" data-compound="${item.compound}" data-parent="${item.parentTu}" data-full="${item.full}">
                ${item.compound}
            </div>
        `).join('');
        
        container.innerHTML = `
            <div class="words-container">
                ${dropZonesHtml}
            </div>
            <div class="drag-items-container">
                <div class="drag-title">📦 Kéo thả từ mở rộng vào ô bên trái</div>
                <div class="drag-items" id="dragItemsList">
                    ${dragItemsHtml}
                </div>
            </div>
        `;
        
        attachDragEvents(questions, correctMap);
    }
    
    function attachDragEvents(questions, correctMap) {
        const dragItems = document.querySelectorAll('.drag-card');
        const dropZones = document.querySelectorAll('.drop-zone');
        
        dragItems.forEach(drag => {
            drag.setAttribute('draggable', 'true');
            
            drag.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({
                    compound: drag.getAttribute('data-compound'),
                    parent: drag.getAttribute('data-parent'),
                    full: drag.getAttribute('data-full')
                }));
                e.dataTransfer.effectAllowed = 'copy';
                drag.classList.add('dragging');
            });
            
            drag.addEventListener('dragend', (e) => {
                drag.classList.remove('dragging');
            });
        });
        
        dropZones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
                zone.classList.add('drag-over');
            });
            
            zone.addEventListener('dragleave', () => {
                zone.classList.remove('drag-over');
            });
            
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                
                const targetParent = zone.getAttribute('data-parent');
                const dragData = JSON.parse(e.dataTransfer.getData('text/plain'));
                const compound = dragData.compound;
                const correctParent = dragData.parent;
                
                const feedbackDiv = document.getElementById('quizFeedback');
                
                if (targetParent === correctParent) {
                    if (quizMatched[targetParent] && !quizMatched[targetParent].includes(compound)) {
                        quizMatched[targetParent].push(compound);
                        const matchedDiv = document.getElementById(`matched-${targetParent}`);
                        if (matchedDiv) {
                            matchedDiv.innerHTML = quizMatched[targetParent].map(m => 
                                `<span class="matched-card"><i class="fas fa-check-circle"></i> ${m}</span>`
                            ).join('');
                        }
                        
                        const dragItem = document.querySelector(`.drag-card[data-compound="${compound}"]`);
                        if (dragItem) dragItem.remove();
                        
                        feedbackDiv.innerHTML = '✅ Đúng!';
                        feedbackDiv.style.color = '#28a745';
                        
                        const currentQuestionWord = questions.find(q => q.tu === targetParent);
                        const totalNeeded = currentQuestionWord ? currentQuestionWord.moRong.length : 0;
                        if (quizMatched[targetParent].length === totalNeeded) {
                            zone.classList.add('completed');
                            quizScore++;
                            document.getElementById('quizScoreBoard').innerHTML = `🎯 Câu ${currentQuizQuestion + 1}/${quizWords.length} | Điểm: ${quizScore}`;
                        }
                        
                        const remainingDrags = document.querySelectorAll('.drag-card');
                        if (remainingDrags.length === 0) {
                            setTimeout(() => {
                                currentQuizQuestion += questions.length;
                                startQuizQuestion();
                            }, 1000);
                        }
                    } else {
                        feedbackDiv.innerHTML = '⚠️ Từ này đã được ghép rồi!';
                        feedbackDiv.style.color = '#ff9800';
                    }
                } else {
                    feedbackDiv.innerHTML = `❌ Sai! "${compound}" không phải từ mở rộng của "${targetParent}"`;
                    feedbackDiv.style.color = '#f44336';
                }
                
                setTimeout(() => {
                    feedbackDiv.innerHTML = '';
                }, 1200);
            });
        });
    }
    
    function endQuiz() {
        document.getElementById('quizModal').style.display = 'none';
        quizActive = false;
        alert(`🎉 Hoàn thành quiz! Bạn đúng ${quizScore}/${quizWords.length} cụm từ.`);
    }

    function initFilters() {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.getAttribute('data-filter');
                const val = btn.getAttribute('data-value');
                currentFilters[type] = val;
                applyFilters();
                updateActiveButtons();
            });
        });
        document.getElementById('resetFilterBtn').addEventListener('click', () => {
            currentFilters = { level: 'all', loai: 'all' };
            applyFilters();
            updateActiveButtons();
        });
    }

    function initModeTabs() {
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentMode = tab.getAttribute('data-mode');
                if (currentMode === 'list') {
                    document.getElementById('listMode').classList.remove('hidden');
                    document.getElementById('flashcardMode').classList.add('hidden');
                    renderListMode();
                } else {
                    document.getElementById('listMode').classList.add('hidden');
                    document.getElementById('flashcardMode').classList.remove('hidden');
                    cardsStudied = 0;
                    flashcardIndex = 0;
                    isFlipped = false;
                    renderFlashcardMode();
                }
            });
        });
    }

    function initTheme() {
        const stored = localStorage.getItem('theme_hsk');
        const body = document.body;
        const btn = document.getElementById('themeToggleBtn');
        const span = document.getElementById('themeText');
        if (stored === 'dark') {
            body.classList.add('dark');
            span.innerText = 'Light mode';
        } else {
            span.innerText = 'Dark mode';
        }
        btn.addEventListener('click', () => {
            body.classList.toggle('dark');
            localStorage.setItem('theme_hsk', body.classList.contains('dark') ? 'dark' : 'light');
            span.innerText = body.classList.contains('dark') ? 'Light mode' : 'Dark mode';
        });
    }

    window.toggleExpand = function(btn) {
        const list = btn.parentElement.querySelector('.compound-list');
        if (list.classList.contains('hidden')) {
            list.classList.remove('hidden');
            btn.innerHTML = '<i class="fas fa-minus-circle"></i> Thu gọn';
        } else {
            list.classList.add('hidden');
            const count = list.children.length;
            btn.innerHTML = `<i class="fas fa-plus-circle"></i> Từ mở rộng (${count})`;
        }
    };

    document.getElementById('quizNextBtn').addEventListener('click', () => {
        if (quizActive) {
            currentQuizQuestion++;
            startQuizQuestion();
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        initFilters();
        initModeTabs();
        initTheme();
        document.getElementById('prevBtn')?.addEventListener('click', prevCard);
        document.getElementById('nextBtn')?.addEventListener('click', nextCard);
        document.getElementById('flipBtn')?.addEventListener('click', flipCard);
        document.getElementById('flashcard')?.addEventListener('click', flipCard);
    });
</script>
</body>
</html>
