<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chuyển CSV sang JSON cho data.js</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: #fff5f7;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        textarea {
            width: 100%;
            height: 300px;
            margin: 1rem 0;
            padding: 1rem;
            font-family: monospace;
            border-radius: 1rem;
            border: 2px solid #fbc4d0;
        }
        button {
            background: #e38b9e;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
            margin-right: 1rem;
        }
        button:hover { background: #c06d82; }
        .output {
            background: #2c2428;
            color: #f0e6ea;
            padding: 1rem;
            border-radius: 1rem;
            overflow-x: auto;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔄 CSV → JSON Converter</h1>
    <p>Dán nội dung file <strong>vocabulary.csv</strong> vào ô bên dưới:</p>
    
    <textarea id="csvInput" placeholder="từ vựng,từ loại,hán việt,pinyin,lục thư,chiết tự,bút thuận,level,từ mở rộng
我,đại từ,ngã,wǒ,hội ý,手+戈: tay cầm binh khí,https://link.gif,HSK1,我们:chúng tôi|我的:của tôi"></textarea>
    
    <button onclick="convertCSV()">Chuyển đổi → JSON</button>
    <button onclick="copyToClipboard()">📋 Copy JSON</button>
    
    <h3>Kết quả (copy vào data.js):</h3>
    <div class="output" id="output">
        <pre id="jsonResult" style="margin:0; color:#ffd966;">Chưa có dữ liệu</pre>
    </div>
    
    <p>✨ <strong>Cách dùng:</strong> Copy kết quả thay thế nội dung trong file <code>data.js</code> (giữ lại window.vocabData = ...)</p>
</div>

<script>
    function convertCSV() {
        const csvText = document.getElementById('csvInput').value;
        const lines = csvText.trim().split('\n');
        const headers = lines[0].split(',').map(h => h.trim());
        
        const result = [];
        for (let i = 1; i < lines.length; i++) {
            const values = parseCSVLine(lines[i]);
            const obj = {};
            headers.forEach((header, idx) => {
                let val = values[idx] ? values[idx].trim() : '';
                if (header === 'từ mở rộng' && val) {
                    // Chuyển "từ: nghĩa|từ2: nghĩa2" thành array
                    obj.moRong = val.split('|').map(item => {
                        const parts = item.split(':');
                        return parts[0] + ': ' + (parts[1] || '');
                    });
                } else if (header === 'từ vựng') {
                    obj.tu = val;
                } else if (header === 'từ loại') {
                    obj.loai = val;
                } else if (header === 'hán việt') {
                    obj.hanviet = val;
                } else if (header === 'pinyin') {
                    obj.pinyin = val;
                } else if (header === 'lục thư') {
                    obj.lucThu = val;
                } else if (header === 'chiết tự') {
                    obj.chiestTu = val;
                } else if (header === 'bút thuận') {
                    obj.buthuan = val;
                } else if (header === 'level') {
                    obj.level = val;
                }
            });
            // Nếu không có từ mở rộng thì để mảng rỗng
            if (!obj.moRong) obj.moRong = [];
            result.push(obj);
        }
        
        const jsonOutput = JSON.stringify(result, null, 2);
        document.getElementById('jsonResult').textContent = `window.vocabData = ${jsonOutput};`;
    }
    
    function parseCSVLine(line) {
        const result = [];
        let inQuote = false;
        let current = '';
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
                inQuote = !inQuote;
            } else if (ch === ',' && !inQuote) {
                result.push(current);
                current = '';
            } else {
                current += ch;
            }
        }
        result.push(current);
        return result;
    }
    
    function copyToClipboard() {
        const text = document.getElementById('jsonResult').textContent;
        navigator.clipboard.writeText(text);
        alert('✅ Đã copy JSON vào clipboard! Hãy paste vào file data.js');
    }
</script>
</body>
</html>
