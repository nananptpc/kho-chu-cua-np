<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Flashcard HSK1 - Từ vựng chiết tự</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #fef5f7 0%, #fce4ec 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }

        body.dark {
            background: linear-gradient(135deg, #121212 0%, #1e1a1c 100%);
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #c06d82;
        }

        body.dark h1 {
            color: #e0a5bb;
        }

        .theme-btn {
            background: #f0c4d0;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        body.dark .theme-btn {
            background: #3a2a38;
            color: #e0b0d5;
        }

        /* Stats bar */
        .stats-bar {
            background: rgba(192, 109, 130, 0.1);
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stats-info {
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Bộ lọc */
        .filter-section {
            background: white;
            border-radius: 1.2rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #f0d0da;
        }

        body.dark .filter-section {
            background: #1e1e1e;
            border-color: #3a2a38;
        }

        .filter-title {
            font-weight: 600;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
            color: #c06d82;
        }

        .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .filter-btn {
            background: #f0d0da;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #5a3e4b;
        }

        body.dark .filter-btn {
            background: #2a2a2a;
            color: #ddd;
        }

        .filter-btn.active {
            background: #c06d82;
            color: white;
        }

        body.dark .filter-btn.active {
            background: #e0a5bb;
            color: #121212;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #c06d82;
            color: #c06d82;
        }

        /* Flashcard */
        .flashcard-container {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .flashcard {
            width: 100%;
            max-width: 550px;
            height: 380px;
            cursor: pointer;
            perspective: 1000px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 1.5rem;
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 12px 28px rgba(0,0,0,0.15);
        }

        .flashcard-front {
            background: linear-gradient(135deg, #fff0f4 0%, #ffe2ea 100%);
            border: 2px solid #f0c4d0;
        }

        .flashcard-back {
            background: linear-gradient(135deg, #e8eef5 0%, #dde4ef 100%);
            transform: rotateY(180deg);
            border: 2px solid #c0d0e0;
        }

        body.dark .flashcard-front {
            background: linear-gradient(135deg, #2a1e24 0%, #3a2a38 100%);
            border-color: #5a4a58;
        }

        body.dark .flashcard-back {
            background: linear-gradient(135deg, #1e2a2a 0%, #2a3a3a 100%);
            border-color: #4a5a5a;
        }

        .flashcard-char {
            font-size: 5rem;
            font-weight: 800;
            color: #c06d82;
            margin-bottom: 0.5rem;
        }

        .flashcard-pinyin {
            font-size: 1.5rem;
            font-weight: 600;
            color: #8ba5b5;
        }

        .flashcard-meaning {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2a6b5e;
            margin-bottom: 0.8rem;
        }

        .flashcard-info {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #888;
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .nav-btn {
            background: #c06d82;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: #a8526a;
            transform: scale(1.02);
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Progress */
        .progress {
            text-align: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: #c06d82;
            margin-top: 0.5rem;
        }

        /* Back link */
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #c06d82;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .flashcard {
                height: 320px;
            }
            .flashcard-char {
                font-size: 3.5rem;
            }
            .flashcard-pinyin {
                font-size: 1.2rem;
            }
            .filter-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-layer-group"></i> Flashcard HSK1 · Chiết tự</h1>
        <button class="theme-btn" id="themeToggleBtn">
            <i class="fas fa-moon"></i> <span id="themeText">Dark mode</span>
        </button>
    </div>

    <!-- Thanh thống kê -->
    <div class="stats-bar" id="statsBar">
        <span><i class="fas fa-database"></i> <span id="totalCount">0</span> từ</span>
        <span><i class="fas fa-filter"></i> <span id="filteredCount">0</span> từ đang hiển thị</span>
        <button class="filter-btn reset-btn" id="resetFilterBtn"><i class="fas fa-undo"></i> Đặt lại</button>
    </div>

    <!-- Bộ lọc -->
    <div class="filter-section">
        <div class="filter-title"><i class="fas fa-sliders-h"></i> Lọc theo</div>
        
        <div class="filter-group">
            <span style="font-size:0.7rem; margin-right:0.5rem;">Level:</span>
            <button class="filter-btn" data-filter="level" data-value="all">📚 Tất cả</button>
            <button class="filter-btn" data-filter="level" data-value="HSK1">📘 HSK1</button>
        </div>

        <div class="filter-group">
            <span style="font-size:0.7rem; margin-right:0.5rem;">Từ loại:</span>
            <button class="filter-btn" data-filter="loai" data-value="all">📖 Tất cả</button>
            <button class="filter-btn" data-filter="loai" data-value="đại từ">👤 Đại từ</button>
            <button class="filter-btn" data-filter="loai" data-value="động từ">⚡ Động từ</button>
            <button class="filter-btn" data-filter="loai" data-value="tính từ">🎨 Tính từ</button>
            <button class="filter-btn" data-filter="loai" data-value="phó từ">🔹 Phó từ</button>
            <button class="filter-btn" data-filter="loai" data-value="hỗn">🔄 Hỗn</button>
        </div>

        <div class="filter-group">
            <span style="font-size:0.7rem; margin-right:0.5rem;">Bài học:</span>
            <button class="filter-btn" data-filter="bai" data-value="all">📚 Tất cả</button>
            <button class="filter-btn" data-filter="bai" data-value="bài 01">📗 Bài 01</button>
            <button class="filter-btn" data-filter="bai" data-value="bài 02">📙 Bài 02</button>
            <button class="filter-btn" data-filter="bai" data-value="bài 03">📕 Bài 03</button>
        </div>
    </div>

    <!-- Flashcard -->
    <div class="flashcard-container">
        <div class="flashcard" id="flashcard">
            <div class="flashcard-inner">
                <div class="flashcard-front">
                    <div class="flashcard-char" id="cardFrontChar">我</div>
                    <div class="flashcard-pinyin" id="cardFrontPinyin">wǒ</div>
                    <div class="flashcard-info">👆 Nhấn để lật thẻ</div>
                </div>
                <div class="flashcard-back">
                    <div class="flashcard-meaning" id="cardBackMeaning">tôi, ta</div>
                    <div class="flashcard-info" id="cardBackInfo">
                        <span id="backLoai">đại từ</span> · <span id="backHanViet">ngã</span><br>
                        <span id="backLucThu">chỉ sự</span><br>
                        <span id="backChietTu">手 + 戈</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Điều khiển -->
    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn"><i class="fas fa-chevron-left"></i> Trước</button>
        <button class="nav-btn" id="flipBtn"><i class="fas fa-sync-alt"></i> Lật thẻ</button>
        <button class="nav-btn" id="nextBtn">Sau <i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="progress" id="progress">Thẻ 0 / 0</div>

    <div style="text-align: center; margin-top: 1rem;">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại danh sách từ vựng</a>
    </div>
</div>

<script src="data.js"></script>
<script>
    let fullData = [];
    let filteredData = [];
    let currentIndex = 0;
    let isFlipped = false;

    // Bộ lọc hiện tại
    let currentFilters = {
        level: 'all',
        loai: 'all',
        bai: 'all'
    };

    // Load dữ liệu
    function loadData() {
        if (window.vocabData && window.vocabData.length) {
            fullData = window.vocabData;
            applyFilters();
            updateStats();
            renderCard();
        } else {
            console.error('Không tìm thấy data.js');
            document.getElementById('statsBar').innerHTML = '⚠️ Lỗi tải dữ liệu';
        }
    }

    // Áp dụng bộ lọc
    function applyFilters() {
        filteredData = fullData.filter(word => {
            if (currentFilters.level !== 'all' && word.level !== currentFilters.level) return false;
            if (currentFilters.loai !== 'all' && word.loai !== currentFilters.loai) return false;
            if (currentFilters.bai !== 'all' && word.bai !== currentFilters.bai) return false;
            return true;
        });
        
        if (filteredData.length === 0 && fullData.length > 0) {
            // Không có kết quả, reset về all
            currentFilters = { level: 'all', loai: 'all', bai: 'all' };
            filteredData = [...fullData];
            updateActiveButtons();
        }
        
        currentIndex = 0;
        isFlipped = false;
        document.getElementById('flashcard').classList.remove('flipped');
        updateStats();
        renderCard();
    }

    // Cập nhật thống kê
    function updateStats() {
        document.getElementById('totalCount').innerText = fullData.length;
        document.getElementById('filteredCount').innerText = filteredData.length;
        document.getElementById('progress').innerText = `Thẻ ${currentIndex + 1} / ${filteredData.length}`;
    }

    // Render flashcard
    function renderCard() {
        if (filteredData.length === 0) {
            document.getElementById('cardFrontChar').innerText = '🎯';
            document.getElementById('cardFrontPinyin').innerText = 'Chưa có từ';
            document.getElementById('cardBackMeaning').innerText = 'Hãy thêm từ mới hoặc reset bộ lọc';
            return;
        }
        
        const word = filteredData[currentIndex];
        const vietMeaning = word.tiengViet || word.nghia || word.meaning || 'Đang cập nhật';
        const chietTu = word.chiestTu || word.chietTu || 'Đang cập nhật';
        // Rút gọn chiết tự nếu quá dài
        const shortChietTu = chietTu.length > 60 ? chietTu.substring(0, 57) + '...' : chietTu;
        
        document.getElementById('cardFrontChar').innerText = word.tu || '?';
        document.getElementById('cardFrontPinyin').innerText = word.pinyin || '';
        document.getElementById('cardBackMeaning').innerHTML = `<i class="fas fa-language"></i> ${vietMeaning}`;
        document.getElementById('backLoai').innerHTML = `<i class="fas fa-tag"></i> ${word.loai || '?'}`;
        document.getElementById('backHanViet').innerHTML = `<i class="fas fa-book"></i> ${word.hanviet || '?'}`;
        document.getElementById('backLucThu').innerHTML = `<i class="fas fa-puzzle-piece"></i> ${word.lucThu || '?'}`;
        document.getElementById('backChietTu').innerHTML = `<i class="fas fa-cubes"></i> ${shortChietTu}`;
        
        updateStats();
    }

    // Cập nhật trạng thái active của nút lọc
    function updateActiveButtons() {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            const filterType = btn.getAttribute('data-filter');
            const filterValue = btn.getAttribute('data-value');
            if (currentFilters[filterType] === filterValue) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // Gắn sự kiện cho bộ lọc
    function initFilters() {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                const filterType = btn.getAttribute('data-filter');
                const filterValue = btn.getAttribute('data-value');
                currentFilters[filterType] = filterValue;
                applyFilters();
                updateActiveButtons();
                // Lật lại thẻ về mặt trước
                isFlipped = false;
                document.getElementById('flashcard').classList.remove('flipped');
            });
        });
        
        document.getElementById('resetFilterBtn').addEventListener('click', () => {
            currentFilters = { level: 'all', loai: 'all', bai: 'all' };
            applyFilters();
            updateActiveButtons();
            document.getElementById('flashcard').classList.remove('flipped');
            isFlipped = false;
        });
    }

    // Điều hướng
    function nextCard() {
        if (filteredData.length === 0) return;
        if (currentIndex + 1 < filteredData.length) {
            currentIndex++;
            isFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
            renderCard();
        }
    }

    function prevCard() {
        if (filteredData.length === 0) return;
        if (currentIndex - 1 >= 0) {
            currentIndex--;
            isFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
            renderCard();
        }
    }

    function flipCard() {
        if (filteredData.length === 0) return;
        const flashcard = document.getElementById('flashcard');
        if (isFlipped) {
            flashcard.classList.remove('flipped');
        } else {
            flashcard.classList.add('flipped');
        }
        isFlipped = !isFlipped;
    }

    // Dark mode
    function initTheme() {
        const stored = localStorage.getItem('theme_hsk_flash');
        const body = document.body;
        const btn = document.getElementById('themeToggleBtn');
        const span = document.getElementById('themeText');
        if (stored === 'dark') {
            body.classList.add('dark');
            span.innerText = 'Light mode';
        } else {
            span.innerText = 'Dark mode';
        }
        btn.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            localStorage.setItem('theme_hsk_flash', isDark ? 'dark' : 'light');
            span.innerText = isDark ? 'Light mode' : 'Dark mode';
        });
    }

    // Khởi tạo
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        initFilters();
        initTheme();
        
        document.getElementById('prevBtn').addEventListener('click', prevCard);
        document.getElementById('nextBtn').addEventListener('click', nextCard);
        document.getElementById('flipBtn').addEventListener('click', flipCard);
        document.getElementById('flashcard').addEventListener('click', flipCard);
    });
</script>
</body>
</html>
