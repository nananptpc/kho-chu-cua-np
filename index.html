<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kho chữ của np – Học tiếng Trung</title>
  <!-- Google Fonts Montserrat -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff5f7;
      font-family: 'Montserrat', sans-serif;
      color: #5a3e4b;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* hero header */
    .hero {
      text-align: center;
      background: #ffe9ef;
      border-radius: 60px;
      padding: 30px 20px;
      margin-bottom: 30px;
      box-shadow: 0 6px 14px rgba(212, 122, 158, 0.1);
    }

    h1 {
      font-size: 3.5rem;
      color: #d47a9e;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .gamification {
      font-size: 1rem;
      font-weight: 500;
      color: #b5838d;
      background: #fff2f5;
      display: inline-block;
      padding: 6px 20px;
      border-radius: 40px;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    /* level boxes */
    .level {
      background: white;
      border-radius: 32px;
      margin-bottom: 25px;
      padding: 15px 25px 20px 25px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.03);
      border: 1px solid #ffdfe8;
    }

    .level-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 8px 0;
    }

    .level-title {
      font-size: 2rem;
      font-weight: 700;
      color: #d47a9e;
    }

    .toggle-icon {
      font-size: 1.6rem;
      transition: transform 0.2s;
      color: #d47a9e;
    }

    .quiz-list {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .quiz-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fffafb;
      border-radius: 60px;
      padding: 12px 20px;
      text-decoration: none;
      border: 1px solid #ffdfe8;
      color: #5a3e4b;
      font-weight: 500;
      transition: 0.2s;
      font-family: 'Montserrat', sans-serif;
    }

    .quiz-link:hover {
      background: #ffeef3;
      border-color: #d47a9e;
      transform: translateX(6px);
    }

    .quiz-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .badge {
      background: #f3c4d4;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      color: #8b5e6b;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .footer {
      text-align: center;
      margin-top: 50px;
      padding: 20px 0 10px;
      border-top: 1px solid #ffdfe8;
      color: #c98aa8;
      font-size: 0.8rem;
      font-weight: 400;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- header -->
  <div class="hero">
    <h1>🌸 kho chữ của np 🌸</h1>
    <div class="gamification">🎮 Gamification 🎮</div>
  </div>

  <!-- HSK1 -->
  <div class="level">
    <div class="level-header" onclick="toggleList('hsk1')">
      <span class="level-title">📘 HSK 1</span>
      <span class="toggle-icon" id="hsk1-icon">▼</span>
    </div>
    <div class="quiz-list" id="hsk1-list">
      <a href="https://nananptpc.github.io/cau-tao-chu-han" class="quiz-link">
        <span class="quiz-name">📖 HSK1 – Quiz 00 – Cấu tạo chữ Hán</span>
        <span class="badge">tượng hình · chỉ sự · hội ý · hình thanh</span>
      </a>
      <a href="https://nananptpc.github.io/quy-tac-viet-chu-han" class="quiz-link">
        <span class="quiz-name">✍️ HSK1 – Quiz – Quy tắc viết chữ Hán</span>
        <span class="badge">bút thuận · thứ tự nét</span>
      </a>
      <!-- thêm quiz mới bằng cách copy dòng trên -->
    </div>
  </div>

  <!-- HSK2 -->
  <div class="level">
    <div class="level-header" onclick="toggleList('hsk2')">
      <span class="level-title">📗 HSK 2</span>
      <span class="toggle-icon" id="hsk2-icon">▶</span>
    </div>
    <div class="quiz-list hidden" id="hsk2-list">
      <div class="quiz-link" style="cursor:default; background:#faf0f3; justify-content:center;">
        ✨ Sắp ra mắt
      </div>
    </div>
  </div>

  <!-- HSK3 -->
  <div class="level">
    <div class="level-header" onclick="toggleList('hsk3')">
      <span class="level-title">📙 HSK 3</span>
      <span class="toggle-icon" id="hsk3-icon">▶</span>
    </div>
    <div class="quiz-list hidden" id="hsk3-list">
      <div class="quiz-link" style="cursor:default; background:#faf0f3; justify-content:center;">
        🌿 Đang xây dựng
      </div>
    </div>
  </div>

  <!-- footer mới -->
  <div class="footer">
    © nananp.tpc
  </div>
</div>

<script>
  function toggleList(level) {
    const list = document.getElementById(level + '-list');
    const icon = document.getElementById(level + '-icon');
    if (list.classList.contains('hidden')) {
      list.classList.remove('hidden');
      icon.innerHTML = '▼';
    } else {
      list.classList.add('hidden');
      icon.innerHTML = '▶';
    }
  }
</script>
</body>
</html>
