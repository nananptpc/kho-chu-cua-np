<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>THẺ TỪ VỰNG - Học tiếng Trung</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header: THẺ TỪ VỰNG ở giữa -->
    <header style="text-align: center;">
      <h1>📚 THẺ TỪ VỰNG</h1>
      <p class="subtitle" style="text-align: center;">học theo chủ đề · trình độ · từ loại · cụm từ kết hợp</p>
    </header>

    <!-- Bộ lọc -->
    <div class="filters">
      <div class="filter-group">
        <label>Trình độ</label>
        <select id="levelFilter">
          <option value="all">Tất cả HSK</option>
          <option value="HSK1">HSK1</option>
          <option value="HSK2">HSK2</option>
          <option value="HSK3">HSK3</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Từ loại</label>
        <select id="posFilter">
          <option value="all">Tất cả</option>
          <option value="danh từ">Danh từ</option>
          <option value="động từ">Động từ</option>
          <option value="tính từ">Tính từ</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Chủ đề</label>
        <select id="topicFilter">
          <option value="all">Tất cả</option>
          <option value="Học tập">Học tập</option>
          <option value="Đồ dùng">Đồ dùng</option>
          <option value="Đồ uống">Đồ uống</option>
          <option value="Kinh doanh">Kinh doanh</option>
        </select>
      </div>
      <button id="clearFilters" class="clear-btn">🗑️ Xoá lọc</button>
    </div>

    <!-- Tab điều hướng (tiếng Việt hoàn toàn) -->
    <div class="tabs">
      <button class="tab-btn active" data-view="grid">📇 Dạng lưới</button>
      <button class="tab-btn" data-view="flashcard">🃏 Thẻ ghi nhớ</button>
      <button class="tab-btn" data-view="exercise">📝 Bài tập</button>
    </div>

    <!-- Khu vực hiển thị chính -->
    <div id="contentArea" class="content-area"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
