<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 Flashcard thông minh - kho chữ của np</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', 'Inter', system-ui, sans-serif;
        }

        body {
            background: #fff5f7;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        /* LỚP PHỦ MẬT KHẨU */
        #access-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .access-box {
            background: white;
            padding: 30px 25px;
            border-radius: 40px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            border: 2px solid #d47a9e;
        }
        .access-box h3 {
            color: #d47a9e;
            margin-bottom: 15px;
        }
        .access-box input {
            width: 100%;
            padding: 12px;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 8px;
            border: 2px solid #ffccda;
            border-radius: 60px;
            margin: 15px 0;
            font-family: monospace;
        }
        .access-box button {
            background: #d47a9e;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
        }
        .error-msg {
            color: #c62828;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* GIAO DIỆN CHÍNH PASTEL PINK */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(255, 105, 180, 0.15);
            padding: 1.8rem;
            border: 1px solid #ffe2f0;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-area {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e88d9e, #f4acb7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .cherry-blossom {
            font-size: 1.9rem;
            display: inline-block;
        }
        .subtitle {
            color: #c2778a;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 6px;
        }

        /* FILTER BAR */
        .filter-bar {
            background: #ffeef4;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            margin-bottom: 1.8rem;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #c0627c;
        }
        select, .reset-btn {
            background: white;
            border: 1px solid #ffcddc;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #8f4b62;
            cursor: pointer;
        }
        .reset-btn {
            background: #ffdae6;
            border: none;
        }
        .reset-btn:hover {
            background: #ffc0d1;
        }

        /* VIEW TOGGLE */
        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }
        .view-btn {
            background: #ffeef4;
            border: none;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            color: #b05d77;
        }
        .view-btn.active {
            background: #f7a1b5;
            color: white;
            box-shadow: 0 4px 10px rgba(247,161,181,0.4);
        }

        /* GRID VOCABULARY */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.3rem;
        }
        .word-card {
            background: white;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 12px 20px -12px rgba(0,0,0,0.05);
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #ffdfea;
        }
        .word-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 28px -12px #ffb7cb80;
        }
        .card-img {
            background: #fff0f5;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border-bottom: 1px solid #ffe1ed;
        }
        .card-info {
            padding: 0.9rem;
        }
        .hanzi {
            font-size: 1.3rem;
            font-weight: 700;
            color: #bc5f7c;
        }
        .pinyin {
            font-size: 0.7rem;
            color: #b88295;
            margin: 5px 0;
        }
        .word-type {
            display: inline-block;
            background: #fce4ec;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 30px;
            color: #bd6b85;
        }
        .meaning {
            font-size: 0.75rem;
            margin-top: 6px;
            font-weight: 500;
            color: #6e4758;
        }
        .theme-badge {
            font-size: 0.6rem;
            background: #f5e1e8;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 6px;
        }

        /* FLASHCARD MODE */
        .flashcard-mode {
            background: #fffafc;
            border-radius: 2rem;
            padding: 1.2rem;
        }
        .flashcard {
            background: linear-gradient(145deg, #ffffff, #fff3f8);
            border-radius: 2rem;
            box-shadow: 0 25px 35px -12px rgba(189, 79, 108, 0.2);
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-align: center;
            border: 1px solid #ffd9e6;
        }
        .front-han {
            font-size: 3rem;
            font-weight: 800;
            margin: 0.8rem 0;
            color: #bc5f7c;
        }
        .front-pinyin {
            font-size: 1.2rem;
            color: #cc879e;
        }
        .back-meaning {
            font-size: 2rem;
            font-weight: 600;
            color: #b45f7a;
        }
        .flashcard-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .flashcard-nav button {
            background: #f6b2c5;
            border: none;
            padding: 8px 22px;
            border-radius: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .loading-message {
            text-align: center;
            padding: 3rem;
            color: #be7c94;
        }
        .study-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #e2a1b5;
            border-top: 1px dashed #ffcddc;
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="mainApp" class="app-container" style="display: none;">
        <div class="brand-header">
            <div class="logo-area">
                <span class="cherry-blossom">🌸</span> Flashcard thông minh <span class="cherry-blossom">🌸</span>
            </div>
            <p class="subtitle">học từ vựng theo chủ đề · trình độ · từ loại</p>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <label>📚 Trình độ</label>
                <select id="filterHsk"></select>
            </div>
            <div class="filter-group">
                <label>🏷️ Từ loại</label>
                <select id="filterType"></select>
            </div>
            <div class="filter-group">
                <label>🌈 Chủ đề</label>
                <select id="filterTheme"></select>
            </div>
            <button id="resetFiltersBtn" class="reset-btn">✨ Xóa lọc</button>
        </div>

        <div class="view-toggle">
            <button id="gridViewBtn" class="view-btn active">📇 Dạng lưới</button>
            <button id="flashcardViewBtn" class="view-btn">🃏 Dạng thẻ ghi nhớ</button>
        </div>

        <div id="contentArea" class="content-area">
            <div class="loading-message">🌸 Đang tải dữ liệu từ vựng... 🌸</div>
        </div>

        <div class="study-footer">
            <span>💡 Mẹo: Bấm vào thẻ để nghe phát âm | Dữ liệu từ file CSV</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
