<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quy tắc viết chữ Hán | Kho Chữ Của NP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #fff5f7;
            color: #5a3e4b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .quiz-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 40px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(212, 122, 158, 0.15);
            border: 1px solid #ffdfe8;
            position: relative;
        }
        .back-home {
            position: absolute;
            top: -15px;
            left: -15px;
            background: white;
            border: 1px solid #ffdfe8;
            border-radius: 60px;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            color: #d47a9e;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .back-home:hover {
            background: #ffeef3;
            border-color: #d47a9e;
            transform: translateX(-3px);
        }
        .header {
            display: flex;
            justify-content: space-between;
            padding-bottom: 20px;
            border-bottom: 2px solid #f3c4d4;
            margin-bottom: 25px;
            font-weight: 600;
            color: #d47a9e;
            font-size: 0.9rem;
        }
        .question-text {
            font-size: 1.35rem;
            line-height: 1.5;
            margin: 30px 0;
            font-weight: 500;
        }
        .chinese-char {
            font-size: 2rem;
            font-weight: 700;
            color: #d47a9e;
            display: inline-block;
            margin: 0 5px;
            background: #fff0f3;
            padding: 5px 15px;
            border-radius: 30px;
        }
        .stroke-demo {
            display: inline-block;
            font-size: 2rem;
            background: #f9eef2;
            padding: 5px 15px;
            border-radius: 20px;
            margin: 0 3px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
        }
        .option {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: #fffafb;
            border: 2px solid #ffdfe8;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .option:hover {
            border-color: #d47a9e;
            background: #ffeef3;
        }
        .option.selected {
            background: #f3c4d4;
            border-color: #d47a9e;
        }
        .option-letter {
            font-weight: 700;
            width: 40px;
            color: #d47a9e;
            font-size: 1rem;
        }
        button {
            background: #d47a9e;
            color: white;
            border: none;
            padding: 14px 25px;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: #b86284;
        }
        .feedback {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 60px;
            text-align: center;
            font-weight: 500;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .feedback.correct {
            background: #d4edda;
            color: #2e7d32;
        }
        .feedback.wrong {
            background: #ffdfe8;
            color: #c62828;
        }
        .hidden {
            display: none;
        }
        .result {
            text-align: center;
            padding: 30px 20px;
        }
        .result h2 {
            color: #d47a9e;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .result p {
            font-size: 1.2rem;
            margin-bottom: 25px;
        }
        .copyright {
            text-align: center;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #ffdfe8;
            color: #c98aa8;
            font-size: 0.75rem;
            font-weight: 400;
        }
        @media (max-width: 550px) {
            .quiz-container { padding: 25px; }
            .question-text { font-size: 1.1rem; }
            .chinese-char { font-size: 1.5rem; }
            .back-home { top: -10px; left: -10px; padding: 5px 15px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <a href="https://nananptpc.github.io/kho-chu-cua-np" class="back-home">← Về thư viện</a>
    <div class="header">
        <span>✍️ NÉT CƠ BẢN & BÚT THUẬN</span>
        <span>🎯 Điểm: <span id="score">0</span></span>
    </div>
    <div id="questionArea">
        <div class="question-text" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
        <button id="submitBtn">CHỐT ĐÁP ÁN</button>
        <div id="feedback" class="feedback hidden"></div>
        <button id="nextBtn" class="hidden">Câu tiếp theo →</button>
    </div>
    <div class="copyright">© nananp.tpc</div>
</div>

<script>
    // Âm thanh
    function playSound(type) {
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.type = 'sine';
            if (type === 'correct') {
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.2;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.4);
                setTimeout(() => oscillator.stop(), 400);
            } else {
                oscillator.frequency.value = 220;
                gainNode.gain.value = 0.2;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                setTimeout(() => oscillator.stop(), 300);
            }
        } catch(e) {}
    }

    // ============================================
    // CÂU HỎI GỐC (8 NÉT CƠ BẢN + THỨ TỰ NÉT)
    // ============================================
    const rawQuestions = [
        // 8 NÉT CƠ BẢN
        {
            text: "Nét <span class='stroke-demo'>㇀</span> (gạch chéo lên phải) có tên là gì?",
            options: ["Nét chấm (丶)", "Nét hất (㇀)", "Nét mác (乛)", "Nét ngang (一)"],
            correct: 1,
            explanation: "✅ Nét hất (㇀): kéo bút từ dưới lên trên, từ trái sang phải, thường gặp ở cuối nét sổ."
        },
        {
            text: "Nét <span class='stroke-demo'>乛</span> (gãy cong) có tên chính xác là gì?",
            options: ["Nét ngang", "Nét sổ", "Nét mác (乛)", "Nét phẩy (丿)"],
            correct: 2,
            explanation: "✅ Nét mác (乛): viết ngang rồi gãy xuống hoặc cong, gặp trong các chữ có bộ khung."
        },
        {
            text: "Đâu là tên của nét <span class='stroke-demo'>㇏</span> (gạch chéo xuống phải, tạo góc)?",
            options: ["Nét phẩy (丿)", "Nét mác (乛)", "Nét chấm (丶)", "Nét mác dài (㇏)"],
            correct: 3,
            explanation: "✅ Nét mác dài (㇏): thường thấy ở cuối chữ 人, 大, tạo sự cân đối."
        },
        {
            text: "Nét sổ (<span class='stroke-demo'>丨</span>) thường được viết theo hướng nào?",
            options: ["Từ dưới lên trên", "Từ trên xuống dưới", "Từ trái sang phải", "Từ phải sang trái"],
            correct: 1,
            explanation: "✅ Nét sổ: bắt đầu từ trên, kéo thẳng xuống dưới. Là nét cơ bản quan trọng."
        },
        {
            text: "Nét phẩy trái (<span class='stroke-demo'>丿</span>) có đặc điểm gì?",
            options: ["Từ trên trái xuống dưới phải", "Từ trên phải xuống dưới trái", "Từ dưới lên trên", "Kéo ngang rồi gãy"],
            correct: 1,
            explanation: "✅ Phẩy trái (丿): đặt bút tại góc trên bên phải, kéo xiên xuống dưới bên trái."
        },
        
        // THỨ TỰ NÉT
        {
            text: "Nguyên tắc 'ngang trước, sổ sau' được áp dụng cho chữ nào?",
            options: ["<span class='chinese-char'>十</span>", "<span class='chinese-char'>八</span>", "<span class='chinese-char'>人</span>", "<span class='chinese-char'>口</span>"],
            correct: 0,
            explanation: "✅ Chữ 十: viết nét ngang (一) trước, rồi nét sổ (丨) sau. Là quy tắc cơ bản nhất."
        },
        {
            text: "Với chữ <span class='chinese-char'>小</span>, thứ tự đúng là:",
            options: ["Giữa → trái → phải", "Trái → giữa → phải", "Phải → giữa → trái", "Trái → phải → giữa"],
            correct: 0,
            explanation: "✅ Nguyên tắc: viết ở giữa trước (亅), rồi nét trái, sau cùng nét phải. Chữ 小: 亅 → 丿 → 丶."
        },
        {
            text: "Chữ <span class='chinese-char'>辶</span> (bộ sước) được viết theo thứ tự nào?",
            options: ["Viết bộ sước trước, sau đó viết phần bên trong", "Viết phần bên trong trước, sau đó mới viết bộ sước", "Viết nét chấm trước, rồi nét khung", "Viết liền mạch một nét"],
            correct: 1,
            explanation: "✅ Bộ sước (chuột): viết phần bên trong trước (thí dụ: 寸), sau cùng mới viết nét sổ vuốt (㇋) và chấm (丶)."
        },
        {
            text: "Với chữ <span class='chinese-char'>口</span>, nét thứ hai là nét gì?",
            options: ["Sổ trái (丨)", "Gập ngang (𠃌)", "Ngang dưới (一)", "Nét hất (㇀)"],
            correct: 0,
            explanation: "✅ Chữ 口: 1. Sổ trái (丨) → 2. Ngang trên (一) → 3. Sổ phải + ngang dưới (𠃍)."
        },
        {
            text: "Chữ <span class='chinese-char'>国</span> (quốc) có thứ tự viết đúng là:",
            options: ["Khung ngoài → bên trong → đóng khung", "Bên trong → khung ngoài", "Khung trái → trong → khung phải", "Khung dưới → trong → khung trên"],
            correct: 0,
            explanation: "✅ Khung bao ngoài (囗) viết nét sổ trái, nét ngang trên, phần bên trong (玉), sau cùng nét ngang dưới đóng khung."
        },
        
        // THÊM VỀ CÁC NÉT KHÁC
        {
            text: "Nét cong (<span class='stroke-demo'>⺄</span>) thường xuất hiện ở chữ nào?",
            options: ["<span class='chinese-char'>乙</span>", "<span class='chinese-char'>十</span>", "<span class='chinese-char'>人</span>", "<span class='chinese-char'>口</span>"],
            correct: 0,
            explanation: "✅ Chữ 乙 (ất) gồm một nét cong phức tạp (⺄), là nét khó nhưng thường gặp."
        },
        {
            text: "Nét gập (<span class='stroke-demo'>𠃍</span>) có điểm gì đặc biệt?",
            options: ["Là kết hợp ngang + sổ", "Là kết hợp sổ + ngang", "Luôn viết sau cùng", "Chỉ có trong một số nét Hán"],
            correct: 0,
            explanation: "✅ Nét gập (𠃍) là nét ngang rồi rẽ xuống (góc vuông), xuất hiện nhiều ở bộ khung."
        },
        {
            text: "Khi viết nét chấm (<span class='stroke-demo'>丶</span>), nên đặt bút như thế nào?",
            options: ["Chấm nhẹ từ trên xuống dưới", "Kéo dài thành nét sổ", "Viết từ dưới lên trên", "Chấm ngang từ trái"],
            correct: 0,
            explanation: "✅ Nét chấm: đặt bút từ trên cao, chấm nhanh xuống dưới, tạo điểm nhấn."
        },
        {
            text: "Thứ tự viết chữ <span class='chinese-char'>水</span> (thủy) là:",
            options: ["Giữa → trái → phải", "Trái → giữa → phải", "Phải → giữa → trái", "Trái → phải → giữa"],
            correct: 0,
            explanation: "✅ 水: nét giữa (亅) trước → nét trái (フ) → nét phải (㇏) và nét cuối (㇀). Nguyên tắc giữa trước."
        },
        {
            text: "Nét mác dài (<span class='stroke-demo'>㇏</span>) thường được viết ở bước nào?",
            options: ["Luôn viết đầu tiên", "Luôn viết cuối cùng", "Viết sau các nét ngang-sổ", "Viết trước nét phẩy"],
            correct: 2,
            explanation: "✅ Thường viết sau khi đã hoàn thành các nét chính, tạo sự cân đối cho chữ (như chữ 人, 大)."
        }
    ];

    // Hàm xáo trộn mảng (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Hàm xáo trộn đáp án của một câu hỏi, trả về options mới và vị trí đáp án mới
    function shuffleOptions(question) {
        const originalOptions = [...question.options];
        const originalCorrectIndex = question.correct;
        const originalCorrectText = originalOptions[originalCorrectIndex];
        
        // Tạo mảng các cặp {text, index} để xáo trộn
        const optionPairs = originalOptions.map((text, idx) => ({ text, originalIndex: idx }));
        const shuffledPairs = shuffleArray([...optionPairs]);
        
        const newOptions = shuffledPairs.map(p => p.text);
        // Tìm vị trí mới của đáp án đúng
        const newCorrectIndex = shuffledPairs.findIndex(p => p.text === originalCorrectText);
        
        return {
            options: newOptions,
            correct: newCorrectIndex
        };
    }

    // Tạo danh sách câu hỏi đã xáo trộn (cả thứ tự câu và thứ tự đáp án)
    function getShuffledQuestions() {
        // Xáo thứ tự câu hỏi
        const shuffledRaw = shuffleArray([...rawQuestions]);
        
        // Với mỗi câu, xáo thứ tự đáp án
        return shuffledRaw.map(q => {
            const shuffled = shuffleOptions(q);
            return {
                text: q.text,
                options: shuffled.options,
                correct: shuffled.correct,
                explanation: q.explanation
            };
        });
    }

    let questions = getShuffledQuestions();
    let currentIndex = 0, score = 0, answered = false, selectedOption = null;
    const totalQ = questions.length;
    document.getElementById('score').innerText = score;

    function loadQuestion() {
        if (currentIndex >= totalQ) {
            document.getElementById('questionArea').innerHTML = `
                <div class="result">
                    <h2>🏆 Hoàn thành! 🏆</h2>
                    <p>Điểm của bạn: ${score}/${totalQ}</p>
                    <p>✍️ ${score === totalQ ? 'Siêu! Bạn nắm vững nét chữ rồi!' : score >= 10 ? 'Tốt lắm, cố gắng thêm chút nữa!' : 'Học lại 8 nét cơ bản và thứ tự viết nhé!'}</p>
                    <button onclick="location.reload()">Làm lại</button>
                    <div><a href="https://nananptpc.github.io/kho-chu-cua-np" class="back-link">← Về thư viện</a></div>
                </div>
            `;
            return;
        }
        answered = false;
        selectedOption = null;
        const q = questions[currentIndex];
        document.getElementById('questionText').innerHTML = q.text;
        const container = document.getElementById('optionsContainer');
        container.innerHTML = '';
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${letters[idx]}.</div><div>${opt}</div>`;
            div.onclick = () => {
                if (answered) return;
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                div.classList.add('selected');
                selectedOption = idx;
            };
            container.appendChild(div);
        });
        document.getElementById('submitBtn').classList.remove('hidden');
        document.getElementById('nextBtn').classList.add('hidden');
        document.getElementById('feedback').classList.add('hidden');
    }

    document.getElementById('submitBtn').onclick = () => {
        if (answered) return;
        if (selectedOption === null) {
            alert('✍️ Vui lòng chọn đáp án!');
            return;
        }
        answered = true;
        const q = questions[currentIndex];
        const isCorrect = (selectedOption === q.correct);
        if (isCorrect) {
            playSound('correct');
            score++;
            document.getElementById('score').innerText = score;
        } else {
            playSound('wrong');
        }
        const fb = document.getElementById('feedback');
        const correctLetter = String.fromCharCode(65 + q.correct);
        const correctText = q.options[q.correct];
        fb.innerHTML = isCorrect 
            ? `✅ ${q.explanation}`
            : `❌ Sai! Đáp án đúng là ${correctLetter}. ${correctText}. ${q.explanation}`;
        fb.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
        fb.classList.remove('hidden');
        document.getElementById('submitBtn').classList.add('hidden');
        document.getElementById('nextBtn').classList.remove('hidden');
    };

    document.getElementById('nextBtn').onclick = () => {
        currentIndex++;
        loadQuestion();
    };

    loadQuestion();
</script>
</body>
</html>
