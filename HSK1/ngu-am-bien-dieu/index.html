<script>
    (function() {
        // ============================================
        // ÂM THANH (nhẹ nhàng, không lỗi WebAudio)
        // ============================================
        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioContext = new AudioContext();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                if (type === 'correct') {
                    oscillator.frequency.value = 880;
                    gainNode.gain.value = 0.2;
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.4);
                    setTimeout(() => oscillator.stop(), 400);
                } else {
                    oscillator.frequency.value = 220;
                    gainNode.gain.value = 0.2;
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.3);
                    setTimeout(() => oscillator.stop(), 300);
                }
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            } catch(e) {
                // im lặng nếu lỗi audio
            }
        }

        // ============================================
        // CÂU HỎI GỐC (30 câu)
        // ============================================
        const rawQuestions = [
            // === PHẦN 1: THANH MẪU (10 câu) ===
            {

            },
            {

            },
            {

            {

            {

                explanation: "✅ 'c' trong pinyin gần giống 'th' tiếng Việt (bật hơi, không rung dây thanh). Ví dụ: 次 (cì)."
            },
            {
                text: "Thanh mẫu nào KHÔNG phải là âm mặt lưỡi (舌面音 - j, q, x)?",
                options: ["j", "q", "x", "zh"],
                correct: 3,
                explanation: "✅ Âm mặt lưỡi: j, q, x (lưỡi nâng lên vòm cứng). 'zh' là âm quặt lưỡi, thuộc nhóm khác."
            },
            {
                text: "Các vận mẫu nào có thể đi với cả ba thanh mẫu <span class='pinyin-example'>j, q, x</span> và <span class='pinyin-example'>g, k, h</span>?",
                options: ["i, ia, ie", "u, ua, uo", "ü, üe", "Không có vận mẫu nào"],
                correct: 3,
                explanation: "✅ j, q, x chỉ đi với i, ü; g, k, h chỉ đi với a, o, e, u. Không có vận mẫu chung."
            },
            {
                text: "Thanh mẫu <span class='pinyin-example'>sh</span> và <span class='pinyin-example'>s</span> khác nhau ở điểm nào?",
                options: ["sh là âm quặt lưỡi, s là âm không quặt lưỡi", "Sh bật hơi, s không bật hơi", "Sh rung dây thanh, s không rung", "Sh là âm môi, s là âm lưỡi"],
                correct: 0,

            },
            // === PHẦN 2: VẬN MẪU & LƯU Ý i/u/ü (10 câu) ===
            {
                text: "Vận mẫu <span class='pinyin-example'>ü</span> (u hai chấm) khi đứng sau thanh mẫu j, q, x được viết thế nào?",

                explanation: "✅ Sau j, q, x, ü được viết thành u (bỏ hai chấm) nhưng vẫn đọc là ü. Ví dụ: 去 (qù) đọc là 'qü' không phải 'qu'."
            },

                options: ["Viết là i, đọc là 'y'", "Viết là yi, đọc là 'i'", "Viết là y, đọc là 'i'", "Viết và đọc là i"],

            },

                text: "Vận mẫu <span class='pinyin-example'>u</span> khi đứng một mình (không có thanh mẫu) được viết thế nào?",
                options: ["Viết là wu", "Viết là u", "Viết là w", "Viết là iu"],
                correct: 0,
                explanation: "✅ u đứng một mình viết thành 'wu'. Ví dụ: 五 (wǔ) — viết wǔ, đọc 'u'."
            },
            {
                text: "Khi vận mẫu <span class='pinyin-example'>i</span> đứng sau thanh mẫu <span class='pinyin-example'>z, c, s</span> được phát âm thế nào?",
                options: ["Giống i bình thường (i)", "Giống 'ư' (không phải i)", "Giống 'ơ'", "Không phát âm"],

            {

        // ============================================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Xáo trộn đáp án của một câu hỏi
        function shuffleOptions(question) {
            const originalOptions = [...question.options];
            const originalCorrectText = originalOptions[question.correct];
            
            const optionPairs = originalOptions.map((text, idx) => ({ text, originalIndex: idx }));
            const shuffledPairs = shuffleArray([...optionPairs]);
            
            const newOptions = shuffledPairs.map(p => p.text);
            const newCorrectIndex = shuffledPairs.findIndex(p => p.text === originalCorrectText);
            
            return {
                options: newOptions,
                correct: newCorrectIndex
            };
        }

        // Tạo danh sách câu hỏi đã xáo trộn hoàn toàn
        function getShuffledQuestions() {
            const shuffledRaw = shuffleArray([...rawQuestions]);
            return shuffledRaw.map(q => {
                const shuffled = shuffleOptions(q);
                return {
                    text: q.text,
                    options: shuffled.options,
                    correct: shuffled.correct,
                    explanation: q.explanation
                };
            });
        }

        // Khởi tạo câu hỏi đã xáo trộn
        let questions = getShuffledQuestions();
        let currentIndex = 0;
        let score = 0;
        let answered = false;
        let selectedOption = null;

        const questionArea = document.getElementById('questionArea');
        const scoreSpan = document.getElementById('score');
        const totalSpan = document.getElementById('total');
        
        function updateScoreUI() {
            scoreSpan.innerText = score;
        }

        function showResult() {
            let message = '';
            if (score === questions.length) message = 'Siêu! Bạn nắm vững ngữ âm rồi!';
            else if (score >= 25) message = 'Xuất sắc! Chỉ còn vài lỗi nhỏ!';
            else if (score >= 20) message = 'Tốt, hãy xem lại câu sai nhé!';
            else message = 'Học lại bảng âm và biến điệu nha!';
            
            questionArea.innerHTML = `
                <div class="result">
                    <h2>🏆 Hoàn thành! 🏆</h2>
                    <p>Điểm của bạn: ${score}/${questions.length}</p>
                    <p>🎵 ${message}</p>
                    <button onclick="location.reload()">Làm lại</button>
                </div>
            `;
        }

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                showResult();
                return;
            }
            
            answered = false;
            selectedOption = null;
            const q = questions[currentIndex];
            if (!q) return;
            
            const letters = ['A', 'B', 'C', 'D'];
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <div class="option" data-opt-index="${idx}">
                        <div class="option-letter">${letters[idx]}.</div>
                        <div>${opt}</div>
                    </div>
                `;
            });
            
            const fullHtml = `
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsContainer">${optionsHtml}</div>
                <button id="submitBtn">CHỐT ĐÁP ÁN</button>
                <div id="feedback" class="feedback hidden"></div>
                <button id="nextBtn" class="hidden">Câu tiếp theo →</button>
            `;
            questionArea.innerHTML = fullHtml;
            
            const optionDivs = document.querySelectorAll('.option');
            optionDivs.forEach(optDiv => {
                optDiv.addEventListener('click', (e) => {
                    if (answered) return;
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    optDiv.classList.add('selected');
                    selectedOption = parseInt(optDiv.getAttribute('data-opt-index'), 10);
                });
            });
            
            const submitBtn = document.getElementById('submitBtn');
            const nextBtn = document.getElementById('nextBtn');
            const feedbackDiv = document.getElementById('feedback');
            
            if (submitBtn) {
                const newSubmit = submitBtn.cloneNode(true);
                submitBtn.parentNode.replaceChild(newSubmit, submitBtn);
                newSubmit.addEventListener('click', () => {
                    if (answered) return;
                    if (selectedOption === null) {
                        alert('🎵 Vui lòng chọn đáp án!');
                        return;
                    }
                    answered = true;
                    const isCorrect = (selectedOption === q.correct);
                    if (isCorrect) {
                        playSound('correct');
                        score++;
                        updateScoreUI();
                    } else {
                        playSound('wrong');
                    }
                    const correctLetter = String.fromCharCode(65 + q.correct);
                    if (feedbackDiv) {
                        feedbackDiv.innerHTML = isCorrect 
                            ? `✅ ${q.explanation}`
                            : `❌ Sai! Đáp án đúng là ${correctLetter}. ${q.explanation}`;
                        feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
                        feedbackDiv.classList.remove('hidden');
                    }
                    const submitButton = document.getElementById('submitBtn');
                    const nextButton = document.getElementById('nextBtn');
                    if (submitButton) submitButton.classList.add('hidden');
                    if (nextButton) nextButton.classList.remove('hidden');
                });
            }
            
            if (nextBtn) {
                const newNext = nextBtn.cloneNode(true);
                nextBtn.parentNode.replaceChild(newNext, nextBtn);
                newNext.addEventListener('click', () => {
                    currentIndex++;
                    loadQuestion();
                });
            }
        }
        
        if (totalSpan) totalSpan.innerText = questions.length;
        updateScoreUI();
        loadQuestion();
    })();
</script>
</body>
</html>
