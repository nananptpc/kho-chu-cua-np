<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Phát âm & Đặt lưỡi | Kho Chữ Của NP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(145deg, #ffe4ec 0%, #ffd9e4 100%);
            color: #6b3e4f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .quiz-wrapper {
            max-width: 850px;
            width: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 56px;
            padding: 35px 32px;
            box-shadow: 0 20px 40px rgba(212, 100, 130, 0.2), 0 4px 12px rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
            border: 1px solid #ffccda;
            position: relative;
        }

        .back-home {
            position: absolute;
            top: -15px;
            left: -15px;
            background: white;
            border: 1px solid #ffccda;
            border-radius: 60px;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            color: #c95c80;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .back-home:hover {
            background: #ffeef3;
            border-color: #e98aae;
            transform: translateX(-3px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 18px;
            border-bottom: 2px solid #ffc0d0;
            margin-bottom: 28px;
        }

        .badge {
            background: #ffecf0;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #c95c80;
            letter-spacing: 0.3px;
        }

        .score-box {
            background: #fff0f4;
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #c95c80;
        }

        .score-box span {
            color: #a23b5e;
            font-size: 1.2rem;
            font-weight: 800;
        }

        .question-card {
            background: #ffffff;
            border-radius: 40px;
            padding: 28px 24px;
            margin: 15px 0 10px;
            box-shadow: 0 6px 14px #ffe2ec;
            border: 1px solid #ffe2ec;
        }

        .question-text {
            font-size: 1.35rem;
            line-height: 1.45;
            font-weight: 500;
            color: #4a2e3a;
            margin-bottom: 28px;
        }

        .pinyin-highlight {
            background: #fee9f0;
            padding: 6px 14px;
            border-radius: 36px;
            display: inline-block;
            font-weight: 700;
            color: #ce6f92;
            font-size: 1rem;
            margin: 0 4px;
            letter-spacing: 0.3px;
        }

        .tongue-tip {
            background: #fef0f5;
            border-left: 5px solid #e98aae;
            padding: 12px 20px;
            border-radius: 28px;
            margin-bottom: 24px;
            font-size: 0.85rem;
            color: #b45d7c;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tongue-tip span:first-child {
            font-size: 1.25rem;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0 24px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: #fffafc;
            border: 2px solid #ffdfe8;
            border-radius: 80px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-item:hover {
            background: #fff2f7;
            border-color: #e98aae;
            transform: translateX(5px);
        }

        .option-item.selected {
            background: #fad1e0;
            border-color: #d16188;
            box-shadow: 0 2px 6px rgba(209, 97, 136, 0.2);
        }

        .opt-letter {
            font-weight: 800;
            width: 42px;
            font-size: 1rem;
            color: #d16188;
        }

        button {
            background: #e98aae;
            color: white;
            border: none;
            padding: 14px 18px;
            font-size: 1rem;
            border-radius: 60px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 6px;
            box-shadow: 0 4px 8px rgba(233, 138, 174, 0.3);
        }

        button:hover {
            background: #d46f96;
            transform: scale(0.98);
        }

        .feedback-message {
            margin-top: 20px;
            padding: 14px 20px;
            border-radius: 50px;
            text-align: center;
            font-weight: 500;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .feedback-correct {
            background: #d9f3e3;
            color: #1f7840;
            border-left: 6px solid #2eaa5e;
        }

        .feedback-wrong {
            background: #ffe4ec;
            color: #bc4e6c;
            border-left: 6px solid #e6577e;
        }

        .hidden {
            display: none;
        }

        .result-area {
            text-align: center;
            padding: 25px 20px 35px;
        }

        .result-area h2 {
            color: #cf7a9c;
            font-size: 2rem;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .result-area p {
            font-size: 1.2rem;
            margin: 12px 0;
        }

        .btn-restart {
            background: #d67a9e;
            margin-top: 25px;
            max-width: 220px;
            display: inline-block;
            width: auto;
            padding: 12px 32px;
        }

        .copyright {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ffd4e2;
            color: #c27d99;
            font-size: 0.7rem;
            font-weight: 400;
        }

        @media (max-width: 550px) {
            .quiz-wrapper {
                padding: 20px;
            }
            .question-text {
                font-size: 1.1rem;
            }
            .option-item {
                padding: 10px 16px;
            }
            .back-home {
                top: -10px;
                left: -10px;
                padding: 5px 15px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <a href="https://nananptpc.github.io/kho-chu-cua-np" class="back-home">← Về thư viện</a>
    <div class="header">
        <div class="badge">🗣️ ĐẶT LƯỠI • PHÁT ÂM</div>
        <div class="score-box">🎯 Điểm: <span id="scoreDisplay">0</span> / <span id="totalQuestions">0</span></div>
    </div>

    <div id="mainContent"></div>

    <div class="copyright">© nananp.tpc — rung động từng âm tiết</div>
</div>

<script>
    (function(){
        // ---------- ÂM THANH NHẸ NHÀNG ----------
        function playFeedbackSound(isCorrect) {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;
                const ctx = new AudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                if (isCorrect) {
                    osc.frequency.value = 880;
                    gain.gain.value = 0.15;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.35);
                    setTimeout(() => osc.stop(), 350);
                } else {
                    osc.frequency.value = 220;
                    gain.gain.value = 0.15;
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
                    setTimeout(() => osc.stop(), 300);
                }
                if (ctx.state === 'suspended') ctx.resume();
            } catch(e) { /* yên lặng */ }
        }

        // ============================================
        // CÂU HỎI GỐC
        // ============================================
        const rawQuestions = [
            {
                text: "Âm <span class='pinyin-highlight'>zh</span> (如: 知 zhī) khi phát âm, lưỡi ở vị trí nào?",
                options: ["Đầu lưỡi chạm răng dưới", "Đầu lưỡi cuốn ngược lên vòm cứng (quặt lưỡi)", "Mặt lưỡi nâng lên sát vòm cứng", "Lưỡi thẳng, không cuốn"],
                correct: 1,
                tip: "👅 ZH, CH, SH, R là âm quặt lưỡi (捲舌音): đầu lưỡi cong lên chạm vòm cứng phía trên.",
                explanation: "✅ zh là âm quặt lưỡi: đầu lưỡi cuốn ngược ra sau, chạm vòm cứng. Giống 'ch' nhưng lưỡi cong hơn."
            },
            {
                text: "Khi phát âm <span class='pinyin-highlight'>j, q, x</span> (âm mặt lưỡi), bộ phận nào hoạt động chính?",
                options: ["Đầu lưỡi và răng", "Mặt lưỡi nâng lên vòm cứng", "Cuống lưỡi và ngạc mềm", "Môi trên và răng"],
                correct: 1,
                tip: "👅 j, q, x gọi là âm mặt lưỡi (舌面音), phần giữa lưỡi áp sát vòm cứng.",
                explanation: "✅ j, q, x được tạo ra bằng cách nâng mặt lưỡi (phần giữa lưỡi) chạm vòm cứng, đầu lưỡi hạ thấp."
            },
            {
                text: "Âm <span class='pinyin-highlight'>r</span> trong tiếng Hán (ví dụ: 日 rì) được phát âm thế nào?",
                options: ["Giống 'r' Việt (rung lưỡi)", "Lưỡi cuốn lên, không rung, ma sát nhẹ", "Giống 'd' nhưng bật hơi", "Giống 'z' nhưng bật hơi"],
                correct: 1,
                tip: "🇨🇳 r là phụ âm quặt lưỡi, lưỡi cuốn lên, luồng hơi đi ra hai bên lưỡi.",
                explanation: "✅ r: đầu lưỡi cuốn lên vòm cứng, phát ra âm xát hữu thanh (rung nhẹ dây thanh). Không rung như 'r' Việt."
            },
            {
                text: "Điểm khác biệt quan trọng giữa <span class='pinyin-highlight'>s</span> (四 sì) và <span class='pinyin-highlight'>sh</span> (是 shì) là gì?",
                options: ["s có luồng hơi mạnh hơn", "sh là âm quặt lưỡi, s là âm đầu lưỡi - răng", "s là âm môi răng", "sh phát ra từ cổ họng"],
                correct: 1,
                tip: "🔊 s: lưỡi thẳng, đặt gần răng dưới; sh: lưỡi cuốn ngược lên vòm.",
                explanation: "✅ s (không quặt lưỡi): đầu lưỡi chạm răng dưới, luồng hơi đi qua khe hẹp. sh (quặt lưỡi): lưỡi cong lên."
            },
            {
                text: "Khi phát âm <span class='pinyin-highlight'>c</span> (如: 次 cì), khí thoát ra như thế nào?",
                options: ["Luồng hơi nhẹ, không bật", "Bật hơi mạnh, luồng khí bật ra", "Hơi thoát qua mũi", "Hơi giữ lại trong khoang miệng"],
                correct: 1,
                tip: "💨 c, p, t, k, q, ch là âm bật hơi (aspirated) — có luồng hơi mạnh.",
                explanation: "✅ c là âm bật hơi: khi phát âm luồng hơi thoát mạnh, đặt tay trước miệng sẽ cảm nhận rõ."
            },
            {
                text: "Để phát âm đúng <span class='pinyin-highlight'>x</span> (西 xī), lưỡi cần:",
                options: ["Cuốn lên chạm vòm cứng như sh", "Mặt lưỡi nâng gần vòm cứng, lưỡi hơi dẹt", "Đầu lưỡi chạm răng trên", "Lưỡi thu về phía cuống họng"],
                correct: 1,
                tip: "✨ x là âm xát mặt lưỡi, không bật hơi, lưỡi nâng nhẹ nhưng không chạm vòm.",
                explanation: "✅ x: mặt lưỡi nâng lên tạo khe hẹp với vòm cứng, luồng hơi đi qua nhẹ (không bật hơi)."
            },
            {
                text: "Thanh mẫu <span class='pinyin-highlight'>z</span> (如: 子 zǐ) được tạo ra giống với âm nào trong tiếng Việt?",
                options: ["Chữ 'ch' bật hơi", "Chữ 'x' không dấu", "Gần giống 'd' hoặc 'đ' nhưng vô thanh", "Giống 't' bật hơi"],
                correct: 2,
                tip: "🇻🇳 z (không bật hơi) phát âm gần giống 'đ' trong tiếng Việt nhưng đầu lưỡi chạm răng trên.",
                explanation: "✅ z là âm tắc xát, đầu lưỡi chạm lợi răng trên, không bật hơi, nghe tựa 'd'/'đ' nhưng vô thanh."
            },
            {
                text: "Khi phát âm <span class='pinyin-highlight'>ü</span> (如: 绿 lǜ), hình dạng môi và lưỡi ra sao?",
                options: ["Môi tròn, lưỡi lùi sau", "Môi tròn, lưỡi nâng lên phía trước (giống i nhưng môi tròn)", "Môi dẹt, lưỡi hạ thấp", "Môi chu ra, lưỡi cong lên"],
                correct: 1,
                tip: "💋 ü giống âm 'i' nhưng tròn môi. Lưỡi đặt gần giống khi phát âm 'i', nhưng môi chúm lại.",
                explanation: "✅ ü: vị trí lưỡi như 'i' (cao, trước) nhưng môi tròn, tạo âm sắc đặc trưng. Không có trong tiếng Việt chuẩn."
            },
            {
                text: "Âm <span class='pinyin-highlight'>h</span> (喝 hē) được phát ra từ bộ phận nào?",
                options: ["Cuống lưỡi và ngạc mềm (họng)", "Đầu lưỡi và răng", "Môi trên và môi dưới", "Khoang mũi"],
                correct: 0,
                tip: "🗣️ h là âm xát ngạc mềm, cuống lưỡi nâng lên gần ngạc mềm, tạo ma sát.",
                explanation: "✅ h: cuống lưỡi nâng lên sát ngạc mềm, luồng hơi thoát qua khe hẹp, tương tự 'h' Việt nhưng mạnh hơn."
            },
            {
                text: "Khi đọc <span class='pinyin-highlight'>-i</span> sau z, c, s (ví dụ: 四 sì), lưỡi đặt ở vị trí?",
                options: ["Giống i bình thường (lưỡi cao phía trước)", "Lưỡi thẳng, đầu lưỡi gần răng, âm 'ư' đặc biệt", "Lưỡi cuốn ngược", "Lưỡi chạm vòm mềm"],
                correct: 1,
                tip: "🔤 i sau z,c,s không phải i thường mà là âm 'ư' (vowel rất ngắn). Đầu lưỡi gần răng trên.",
                explanation: "✅ Trong tổ hợp zi, ci, si, 'i' đọc như 'ư' (phát âm với lưỡi thẳng, luồng hơi nhẹ)."
            },
            {
                text: "Làm sao để phân biệt <span class='pinyin-highlight'>j</span> và <span class='pinyin-highlight'>zh</span>?",
                options: ["j là âm mặt lưỡi, zh là quặt lưỡi", "j bật hơi, zh không bật", "j có môi tròn, zh môi dẹt", "j phát âm từ thanh quản"],
                correct: 0,
                tip: "👄 j (mặt lưỡi) phát ra từ giữa lưỡi - vòm cứng; zh (quặt lưỡi) đầu lưỡi cuốn lên.",
                explanation: "✅ j: mặt lưỡi tiếp xúc vòm cứng, đầu lưỡi hạ. zh: đầu lưỡi cong lên chạm vòm cứng."
            },
            {
                text: "Quy tắc đặt lưỡi khi phát âm <span class='pinyin-highlight'>ch</span> (吃 chī) so với <span class='pinyin-highlight'>c</span> (次 cì):",
                options: ["ch: quặt lưỡi + bật hơi; c: đầu lưỡi chạm răng + bật hơi", "ch: không bật hơi; c: bật hơi", "ch và c đều là âm quặt lưỡi", "ch là âm môi, c là âm lưỡi"],
                correct: 0,
                tip: "🎯 ch (quặt lưỡi, bật hơi) – c (âm răng, bật hơi). Cả hai đều bật hơi nhưng vị trí lưỡi hoàn toàn khác.",
                explanation: "✅ ch: đầu lưỡi cuốn, luồng hơi mạnh. c: đầu lưỡi chạm mặt sau răng trên, luồng hơi bật ra."
            },
            {
                text: "Khi nói <span class='pinyin-highlight'>-ian</span> (如: 天 tiān), lưỡi chuyển động như thế nào?",
                options: ["Từ i cao trước trượt xuống âm a, lưỡi hạ dần", "Lưỡi cố định không di chuyển", "Lưỡi lùi ra sau", "Lưỡi cuốn lên vòm"],
                correct: 0,
                tip: "📈 iên: bắt đầu với lưỡi cao (i) sau đó trượt xuống vị trí a phía trước.",
                explanation: "✅ ian = i + ên, lưỡi từ vị trí cao trước (i) hạ thấp xuống để phát âm 'ên'."
            },
            {
                text: "Âm <span class='pinyin-highlight'>ng</span> cuối (如: 江 jiāng) đặt lưỡi thế nào?",
                options: ["Lưỡi chạm răng trên", "Cuống lưỡi nâng lên chạm ngạc mềm", "Đầu lưỡi cuốn lên", "Lưỡi thả lỏng"],
                correct: 1,
                tip: "🔊 -ng là âm vòm mềm, cuống lưỡi nâng lên chạm ngạc mềm, khí thoát mũi.",
                explanation: "✅ âm cuối ng: cuống lưỡi tiếp xúc ngạc mềm, luồng hơi qua khoang mũi."
            },
            {
                text: "Để phát âm <span class='pinyin-highlight'>sh</span> thành thạo, lưỡi phải:",
                options: ["Cong lên không chạm vòm, luồng hơi đi qua khe hẹp", "Ấn mạnh vào răng cửa", "Thụt sâu vào họng", "Rung liên hồi"],
                correct: 0,
                tip: "🌀 sh (quặt lưỡi) lưỡi cong lên, tạo khe hẹp với vòm cứng, hơi xát nhẹ.",
                explanation: "✅ sh: đầu lưỡi cuốn lên phía sau, không chạm vòm, để luồng hơi ma sát qua khe hẹp."
            }
        ];

        // ============================================
        // HÀM XÁO TRỘN
        // ============================================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Xáo trộn đáp án của một câu hỏi
        function shuffleOptions(question) {
            const originalOptions = [...question.options];
            const originalCorrectText = originalOptions[question.correct];
            
            const optionPairs = originalOptions.map((text, idx) => ({ text, originalIndex: idx }));
            const shuffledPairs = shuffleArray([...optionPairs]);
            
            const newOptions = shuffledPairs.map(p => p.text);
            const newCorrectIndex = shuffledPairs.findIndex(p => p.text === originalCorrectText);
            
            return {
                options: newOptions,
                correct: newCorrectIndex
            };
        }

        // Tạo danh sách câu hỏi đã xáo trộn hoàn toàn
        function getShuffledQuestions() {
            const shuffledRaw = shuffleArray([...rawQuestions]);
            return shuffledRaw.map(q => {
                const shuffled = shuffleOptions(q);
                return {
                    text: q.text,
                    options: shuffled.options,
                    correct: shuffled.correct,
                    tip: q.tip,
                    explanation: q.explanation
                };
            });
        }

        // Khởi tạo câu hỏi đã xáo trộn
        let questions = getShuffledQuestions();
        let currentIdx = 0;
        let userScore = 0;
        let answeredFlag = false;
        let pickedOptionIndex = null;

        const mainContainer = document.getElementById('mainContent');
        const scoreSpan = document.getElementById('scoreDisplay');
        const totalSpan = document.getElementById('totalQuestions');
        totalSpan.innerText = questions.length;

        function updateHeaderScore() {
            scoreSpan.innerText = userScore;
        }

        function renderResult() {
            let msg = "";
            if (userScore === questions.length) msg = "✨ Hoàn hảo! Bạn đã nắm vững cách đặt lưỡi ✨";
            else if (userScore >= 12) msg = "🎤 Rất tốt! Luyện thêm chút nữa sẽ chuẩn như người bản xứ!";
            else if (userScore >= 8) msg = "💪 Cố gắng thêm, chú ý vị trí lưỡi và luồng hơi nhé!";
            else msg = "🌸 Đừng nản, hãy xem lại mẹo đặt lưỡi ở mỗi câu và thử lại!";

            mainContainer.innerHTML = `
                <div class="result-area">
                    <h2>🏆 KẾT THÚC 🏆</h2>
                    <p>Điểm khảo sát phát âm: <strong style="font-size:1.8rem; color:#cf6f92;">${userScore}/${questions.length}</strong></p>
                    <p>🌸 ${msg}</p>
                    <button class="btn-restart" id="restartQuiz">🔄 LÀM LẠI</button>
                </div>
            `;
            const restartBtn = document.getElementById('restartQuiz');
            if (restartBtn) {
                restartBtn.addEventListener('click', () => {
                    // Reset toàn bộ
                    questions = getShuffledQuestions();
                    currentIdx = 0;
                    userScore = 0;
                    answeredFlag = false;
                    pickedOptionIndex = null;
                    updateHeaderScore();
                    totalSpan.innerText = questions.length;
                    loadCurrentQuestion();
                });
            }
        }

        function loadCurrentQuestion() {
            if (currentIdx >= questions.length) {
                renderResult();
                return;
            }

            const q = questions[currentIdx];
            if (!q) return;

            answeredFlag = false;
            pickedOptionIndex = null;

            let optionsHtml = '';
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                optionsHtml += `
                    <div class="option-item" data-opt-val="${idx}">
                        <div class="opt-letter">${letters[idx]}.</div>
                        <div>${opt}</div>
                    </div>
                `;
            });

            const tipHtml = q.tip ? `<div class="tongue-tip"><span>👅 MẸO ĐẶT LƯỠI:</span> <span>${q.tip}</span></div>` : '';

            const fullHtml = `
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    ${tipHtml}
                    <div class="options-grid" id="optionsGrid">${optionsHtml}</div>
                    <button id="submitAnswerBtn">✅ CHỐT ĐÁP ÁN</button>
                    <div id="feedbackArea" class="feedback-message hidden"></div>
                    <button id="nextQuestionBtn" class="hidden">🗣️ CÂU TIẾP THEO →</button>
                </div>
            `;
            mainContainer.innerHTML = fullHtml;

            const optionDivs = document.querySelectorAll('.option-item');
            optionDivs.forEach(opt => {
                opt.addEventListener('click', (e) => {
                    if (answeredFlag) return;
                    document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
                    opt.classList.add('selected');
                    pickedOptionIndex = parseInt(opt.getAttribute('data-opt-val'), 10);
                });
            });

            const submitBtn = document.getElementById('submitAnswerBtn');
            const feedbackDiv = document.getElementById('feedbackArea');
            const nextBtn = document.getElementById('nextQuestionBtn');

            if (submitBtn) {
                const newSubmit = submitBtn.cloneNode(true);
                submitBtn.parentNode.replaceChild(newSubmit, submitBtn);
                newSubmit.addEventListener('click', () => {
                    if (answeredFlag) return;
                    if (pickedOptionIndex === null) {
                        alert('🌸 Hãy chọn một đáp án về cách phát âm / đặt lưỡi nhé!');
                        return;
                    }
                    answeredFlag = true;
                    const isAnswerCorrect = (pickedOptionIndex === q.correct);
                    if (isAnswerCorrect) {
                        playFeedbackSound(true);
                        userScore++;
                        updateHeaderScore();
                    } else {
                        playFeedbackSound(false);
                    }
                    const correctLetterLabel = String.fromCharCode(65 + q.correct);
                    const correctAnswerText = q.options[q.correct];
                    let explanationText = q.explanation || "";
                    if (!isAnswerCorrect) {
                        feedbackDiv.innerHTML = `❌ <strong>Chưa chính xác!</strong> Đáp án đúng: ${correctLetterLabel}. ${correctAnswerText}<br>📖 ${explanationText}`;
                        feedbackDiv.className = "feedback-message feedback-wrong";
                    } else {
                        feedbackDiv.innerHTML = `🎉 <strong>Chính xác!</strong> ${explanationText}`;
                        feedbackDiv.className = "feedback-message feedback-correct";
                    }
                    feedbackDiv.classList.remove('hidden');
                    
                    const currentSubmit = document.getElementById('submitAnswerBtn');
                    const currentNext = document.getElementById('nextQuestionBtn');
                    if (currentSubmit) currentSubmit.classList.add('hidden');
                    if (currentNext) currentNext.classList.remove('hidden');
                });
            }

            if (nextBtn) {
                const freshNext = nextBtn.cloneNode(true);
                nextBtn.parentNode.replaceChild(freshNext, nextBtn);
                freshNext.addEventListener('click', () => {
                    currentIdx++;
                    loadCurrentQuestion();
                });
            }
        }

        loadCurrentQuestion();
    })();
</script>
</body>
</html>
